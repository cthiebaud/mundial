<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional performance · World Cup 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
body { background: #faf9f6; font-family: system-ui, sans-serif; height: 100vh; }
#app  { height: 100%; display: flex; flex-direction: column; }

#header {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 10px 20px; background: #faf9f6;
  border-bottom: 1px solid #e4e0d8; flex-shrink: 0;
}
#header h1 { font-size: .95rem; font-weight: 600; color: #333; flex: 1; margin: 0; }

#controls { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.switch-label { font-size: .82rem; color: #555; user-select: none; white-space: nowrap; cursor: pointer; }
#select-region { font-size: .82rem; }


#map-wrap {
  flex: 1;
  min-height: 0;   /* prevents flex child from growing beyond allocated height */
  position: relative;
  overflow: hidden;
}
world-map { display: block; width: 100%; height: 100%; }
world-map svg { display: block; width: 100%; height: 100%; touch-action: none; }
</style>
</head>
<body>
<div id="app" class="container-xxl px-0">
<div id="header">
  <h1 id="title">Group stage performance · World Cup 2026</h1>
  <div id="controls">
    <button id="btn-world" class="btn btn-sm btn-outline-secondary" title="Full world view"><img src="/images/solar_linear/global-svgrepo-com.svg" width="16" height="16" alt="World"></button>
    <select id="select-region" class="form-select form-select-sm" style="width:auto">
      <option value="">Confederation…</option>
      <option value="uefa">UEFA — Europe</option>
      <option value="afc">AFC — Asia</option>
      <option value="caf">CAF — Africa</option>
      <option value="conmebol">CONMEBOL — South America</option>
      <option value="concacaf">CONCACAF — N. &amp; C. America</option>
      <option value="ofc">OFC — Oceania</option>
    </select>
    <div id="switch-phase-group" class="d-flex align-items-center gap-2">
      <span class="switch-label">Qualified</span>
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" role="switch" id="switch-phase">
      </div>
      <span class="switch-label">Round of 32</span>
    </div>
  </div>
</div>
<div id="map-wrap">
  <world-map></world-map>
</div>
</div><!-- #app -->

<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script type="module">
import { choroFill, FLAG_CDN, FLAG, FLAG_SIZE_ZOOM_EXP, W, H } from '../js/map-container.js';
import { QUALIFIED_BY_NAME, QUALIFIED_NAMES, buildAliveAndKicking } from '../js/qualified.js';

// ── Confederation definitions (FIFA) ─────────────────────────────────────────
const REGIONS = {
  uefa: {
    label: 'UEFA',
    ids: new Set([
      8, 20, 40, 51, 31, 56, 70, 100, 112, 191, 196, 203, 208, 233, 234,
      246, 250, 268, 276, 292, 300, 348, 352, 372, 376, 380, 383, 398,
      428, 438, 440, 442, 470, 498, 499, 528, 578, 616, 620, 642, 643,
      674, 688, 703, 705, 724, 752, 756, 792, 804, 807,
      8260, 8261, 8262, 8263, // England, Scotland, Wales, Northern Ireland
    ]),
    bounds: [[-25, 72], [50, 34]],
  },
  afc: {
    label: 'AFC',
    ids: new Set([
      4, 36, 48, 50, 64, 96, 104, 116, 144, 156, 158, 275, 316, 344,
      356, 360, 364, 368, 392, 400, 408, 410, 414, 417, 418, 422, 446,
      458, 462, 496, 512, 524, 586, 608, 626, 634, 682, 702, 704, 760,
      762, 764, 784, 795, 860, 887,
      // Afghanistan, Australia, Bahrain, Bangladesh, Bhutan, Brunei, Myanmar,
      // Cambodia, Sri Lanka, China, Chinese Taipei, Palestine, Guam, Hong Kong,
      // India, Indonesia, Iran, Iraq, Japan, Jordan, North Korea, South Korea,
      // Kuwait, Kyrgyzstan, Laos, Lebanon, Macao, Malaysia, Maldives, Mongolia,
      // Oman, Nepal, Pakistan, Philippines, Timor-Leste, Qatar, Saudi Arabia,
      // Singapore, Vietnam, Syria, Tajikistan, Thailand, UAE, Turkmenistan,
      // Uzbekistan, Yemen
    ]),
    bounds: [[24, 56], [155, -48]], // Asia + Australia
  },
  caf: {
    label: 'CAF',
    ids: new Set([
      12, 24, 72, 108, 120, 132, 140, 148, 174, 178, 180, 204, 226, 231,
      232, 262, 266, 270, 288, 324, 384, 404, 426, 430, 434, 450, 454,
      466, 478, 480, 504, 508, 516, 562, 566, 624, 646, 678, 686, 690,
      694, 706, 710, 716, 728, 729, 748, 768, 788, 800, 818, 834, 854, 894,
    ]),
    zoom: [3.9699, -1449.54, -731.49], // tuned
  },
  conmebol: {
    label: 'CONMEBOL',
    ids: new Set([32, 68, 76, 152, 170, 218, 600, 604, 858, 862]),
    bounds: [[-82, 13], [-34, -57]],
  },
  concacaf: {
    label: 'CONCACAF',
    ids: new Set([
      28, 44, 52, 60, 84, 92, 124, 136, 188, 192, 212, 214, 222, 308,
      312, 320, 328, 332, 340, 388, 474, 484, 500, 531, 533, 558, 591,
      630, 659, 660, 662, 670, 740, 780, 796, 840, 850,
    ]),
    bounds: [[-170, 72], [-55, 5]],
  },
  ofc: {
    label: 'OFC',
    ids: new Set([16, 90, 184, 242, 258, 540, 548, 554, 598, 776, 882]),
    bounds: [[155, -5], [180, -55]],
  },
};

// ── Standalone flag positions (countries absent from 110m topojson) ───────────
const STANDALONE = [
  { id: 132, lon: -27.6, lat: 19.1 }, // Cape Verde  (flag offset into Atlantic)
  { id: 531, lon: -65.0, lat: 16.2 }, // Curaçao    (flag offset north in Caribbean)
];

// ── Map infrastructure ────────────────────────────────────────────────────────
const _wm = document.querySelector('world-map');
const { svg, g, projection, path, zoom } = _wm;

_wm.onZoom = e => {
  const { x, y, k } = e.transform;
  console.log(`zoom  k=${k.toFixed(4)}  tx=${x.toFixed(2)}  ty=${y.toFixed(2)}`);
};

// ── Data ─────────────────────────────────────────────────────────────────────
const [mapData, eloData, r32Data, world, ukNations] = await Promise.all([
  fetch('../data/map_data.json').then(r => r.json()),
  fetch('../data/elo_rank.json').then(r => r.json()),
  fetch('../data/r32_teams.json').then(r => r.json()).catch(() => null),
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
  fetch('../data/uk-nations.geojson').then(r => r.json()),
]);

// ── Build byId (identical coloring to main map) ───────────────────────────────
const nativeByCountry = {};
if (mapData.natives) {
  Object.entries(mapData.natives).forEach(([name, players]) => {
    const nId = QUALIFIED_BY_NAME[name];
    if (nId != null) nativeByCountry[nId] = players;
  });
}
const byId = {};
(mapData.data ?? []).forEach(d => {
  d.ratio = d.count + (nativeByCountry[d.id]?.length ?? 0);
  byId[d.id] = d;
});
Object.entries(nativeByCountry).forEach(([nId, players]) => {
  const id = +nId;
  if (byId[id]) return;
  byId[id] = { id, ratio: players.length };
});

const _alive = buildAliveAndKicking(r32Data);

const ALL_QUALIFIED = eloData.rankings
  .filter(r => QUALIFIED_NAMES[r.id] && r.iso2)
  .map(r => ({ id: r.id, iso2: r.iso2.toLowerCase() }));

// ── Patch Kosovo ─────────────────────────────────────────────────────────────
world.objects.countries.geometries.forEach(geo => {
  if (!geo.id && geo.properties?.name === 'Kosovo') geo.id = 383;
});

// ── Choropleth ────────────────────────────────────────────────────────────────
g.append('path').datum({ type: 'Sphere' })
  .attr('d', path).attr('fill', '#b8d8ea').attr('stroke', 'none');
g.append('path').datum(d3.geoGraticule()())
  .attr('d', path).attr('fill', 'none').attr('stroke', '#ccc4dc').attr('stroke-width', .25);

const countries = topojson.feature(world, world.objects.countries);
const UK_IDS = { ENG: 8260, SCT: 8261, WLS: 8262, NIR: 8263 };

function _pulseFlag(id) {
  const flag = flagsG.select(`.flag-qualified[data-id="${id}"]`);
  if (flag.empty() || flag.style('display') === 'none') return;
  if (+flag.attr('opacity') < 1) return;
  const k = d3.zoomTransform(svg.node()).k;
  const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
  animateFlagPulse(flag.node(), s, +flag.attr('data-cx'), +flag.attr('data-cy'));
}

g.selectAll('path.country')
  .data(countries.features.filter(d => +d.id !== 826))
  .join('path').attr('class', 'country').attr('d', path)
    .attr('data-id', d => +d.id)
    .attr('fill', d => choroFill(+d.id, byId))
    .attr('stroke', '#ccc8c0').attr('stroke-width', .3)
    .on('click', function() { _pulseFlag(+this.getAttribute('data-id')); });

g.selectAll('path.country-uk')
  .data(ukNations.features)
  .join('path').attr('class', 'country country-uk').attr('d', path)
    .attr('data-id', d => UK_IDS[d.properties.GU_A3])
    .attr('fill', d => choroFill(UK_IDS[d.properties.GU_A3], byId))
    .attr('stroke', '#ccc8c0').attr('stroke-width', .3)
    .on('click', function() { _pulseFlag(+this.getAttribute('data-id')); });

g.append('path')
  .datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b))
  .attr('fill', 'none').attr('stroke', '#b8b0a8').attr('stroke-width', .3).attr('d', path);

// ── Dim overlay (updated on region change) ────────────────────────────────────
const DIM_FILL  = 'rgba(250,249,246,0.72)';
const DIM_CLEAR = 'rgba(250,249,246,0)';   // transparent — allows smooth transitions
const dimPaths = g.selectAll('path.country-dim')
  .data(countries.features.filter(d => +d.id !== 826))
  .join('path').attr('class', 'country-dim').attr('d', path)
    .attr('fill', DIM_CLEAR).attr('stroke', 'none').attr('pointer-events', 'none');

// UK nations are never in a region set — start transparent
g.selectAll('path.country-uk-dim')
  .data(ukNations.features)
  .join('path').attr('class', 'country-uk-dim').attr('d', path)
    .attr('fill', DIM_CLEAR).attr('stroke', 'none').attr('pointer-events', 'none');

function updateDimOverlay(regionIds) {
  dimPaths.transition().duration(600)
    .attr('fill', d => regionIds.has(+d.id) ? DIM_CLEAR : DIM_FILL);
  g.selectAll('path.country-uk-dim').transition().duration(600).attr('fill', DIM_FILL);
}

// ── Centroids ─────────────────────────────────────────────────────────────────
const CENTROID_OVERRIDE = { 250: [2.5, 46.5], 840: [-98, 38], 8261: [-4.2, 56.8], 191: [16.8, 45.8] };
const centroids = {};
countries.features.forEach(f => {
  if (!f.id) return;
  const ov = CENTROID_OVERRIDE[+f.id];
  centroids[+f.id] = ov ? projection(ov) : path.centroid(f);
});
const UK_CENTROID_IDS = { ENG: 8260, SCT: 8261, WLS: 8262, NIR: 8263 };
ukNations.features.forEach(f => {
  const id = UK_CENTROID_IDS[f.properties.GU_A3];
  if (!id) return;
  const ov = CENTROID_OVERRIDE[id];
  centroids[id] = ov ? projection(ov) : path.centroid(f);
});
// Standalone countries absent from topojson
STANDALONE.forEach(({ id, lon, lat }) => { centroids[id] = projection([lon, lat]); });

// ── Flags ─────────────────────────────────────────────────────────────────────
const flagsG = g.append('g').attr('class', 'flags');

const STAGGER_MS  = 65;
const ANIM_IN_MS  = 420;
const ANIM_OUT_MS = 320;

function _shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Grow from 0 with elastic overshoot (bulge).
function animateFlagIn(node, s, cx, cy, delay, finalOpacity = 1) {
  d3.select(node)
    .attr('x', cx).attr('y', cy).attr('width', 0).attr('height', 0).attr('opacity', 0)
    .transition().delay(delay).duration(ANIM_IN_MS)
    .ease(d3.easeElasticOut.amplitude(2.2).period(0.4))
    .attr('width', s).attr('height', s)
    .attr('x', cx - s/2).attr('y', cy - s/2)
    .attr('opacity', finalOpacity);
}

// Click pulse: expand to 3× then spring back to resting size. Never touches opacity.
function animateFlagPulse(node, s, cx, cy) {
  const big = s * 3;
  d3.select(node).interrupt()
    .transition().duration(550).ease(d3.easeQuadOut)
      .attr('width', big).attr('height', big)
      .attr('x', cx - big/2).attr('y', cy - big/2)
    .transition().duration(1400).ease(d3.easeElasticOut.amplitude(1.0).period(0.52))
      .attr('width', s).attr('height', s)
      .attr('x', cx - s/2).attr('y', cy - s/2);
}

// Grow to 1.5× while fading out; hide when done.
function animateFlagOut(node, s, cx, cy, delay) {
  const big = s * 1.5;
  d3.select(node)
    .transition().delay(delay).duration(ANIM_OUT_MS)
    .ease(d3.easeQuadIn)
    .attr('width', big).attr('height', big)
    .attr('x', cx - big/2).attr('y', cy - big/2)
    .attr('opacity', 0)
    .on('end', function() { d3.select(this).style('display', 'none'); });
}

// Render all qualified flags. animate=true staggers in with random order.
// regionIds: if provided, non-region flags animate to 0.28 opacity.
function renderFlags(phase, animate = false, regionIds = null) {
  flagsG.selectAll('*').interrupt().remove();
  const k = d3.zoomTransform(svg.node()).k;
  const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
  const toAnimate = [];
  for (const { id, iso2 } of ALL_QUALIFIED) {
    const c = centroids[id];
    if (!c || !isFinite(c[0])) continue;
    const [cx, cy] = c;
    const hidden = phase === 'after' && _alive && !_alive.has(iso2);
    const finalOpacity = regionIds ? (regionIds.has(id) ? 1 : 0.28) : 1;
    const node = flagsG.append('image')
      .classed('flag-qualified', true)
      .attr('data-id', id).attr('data-iso2', iso2)
      .attr('data-cx', cx).attr('data-cy', cy)
      .attr('href', FLAG_CDN(iso2))
      .attr('clip-path', 'inset(0% round 50%)')
      .style('display', hidden ? 'none' : null)
      .on('click', function() {
        if (+d3.select(this).attr('opacity') < 1) return;
        const k2 = d3.zoomTransform(svg.node()).k;
        const s2 = FLAG / Math.pow(k2, 1 - FLAG_SIZE_ZOOM_EXP);
        animateFlagPulse(this, s2, cx, cy);
      })
      .node();
    if (!hidden && animate && finalOpacity === 1) {
      d3.select(node).attr('x', cx).attr('y', cy).attr('width', 0).attr('height', 0).attr('opacity', 0);
      toAnimate.push({ node, cx, cy, finalOpacity });
    } else {
      d3.select(node)
        .attr('x', cx - s/2).attr('y', cy - s/2)
        .attr('width', s).attr('height', s)
        .attr('opacity', finalOpacity);
    }
  }
  if (toAnimate.length > 0) {
    _shuffle(toAnimate);
    toAnimate.forEach(({ node, cx, cy, finalOpacity }, i) =>
      animateFlagIn(node, s, cx, cy, i * STAGGER_MS, finalOpacity));
  }
}

// Dim flags outside the region — called only when region changes, never on phase change.
function applyRegionOpacity(regionIds) {
  flagsG.selectAll('.flag-qualified')
    .transition().duration(500)
    .attr('opacity', function() {
      return regionIds.has(+this.getAttribute('data-id')) ? 1 : 0.28;
    });
}

// Opacity derived from current region state — never from DOM (animateFlagOut sets it to 0).
function _regionOpacity(id) {
  return selRegion.value === '' ? 1
       : REGIONS[regionKey].ids.has(id) ? 1 : 0.28;
}

// Show/hide flags based on phase with optional staggered animation.
// Never touches opacity — that is owned by applyRegionOpacity / btn-world.
function updatePhaseVisibility(animate = false) {
  const k = d3.zoomTransform(svg.node()).k;
  const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
  const toShow = [], toHide = [];
  flagsG.selectAll('.flag-qualified').each(function() {
    const iso2 = this.getAttribute('data-iso2');
    const cx   = +this.getAttribute('data-cx');
    const cy   = +this.getAttribute('data-cy');
    const hidden     = this.style.display === 'none';
    const id         = +this.getAttribute('data-id');
    const shouldHide = phase === 'after' && _alive && !_alive.has(iso2);
    const op         = _regionOpacity(id);
    if (shouldHide && !hidden) {
      if (animate && op === 1) toHide.push({ node: this, cx, cy });
      else d3.select(this).style('display', 'none');
    } else if (!shouldHide && hidden) {
      d3.select(this).style('display', null);
      if (animate && op === 1) toShow.push({ node: this, cx, cy });
      else d3.select(this).attr('x', cx - s/2).attr('y', cy - s/2).attr('width', s).attr('height', s).attr('opacity', op);
    }
  });
  _shuffle(toHide);
  toHide.forEach(({ node, cx, cy }, i) => animateFlagOut(node, s, cx, cy, i * STAGGER_MS));
  _shuffle(toShow);
  toShow.forEach(({ node, cx, cy }, i) => animateFlagIn(node, s, cx, cy, i * STAGGER_MS, 1));
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
function zoomToRegion(regionKey) {
  const r = REGIONS[regionKey];
  let transform;
  if (r.zoom) {
    const [k, tx, ty] = r.zoom;
    transform = d3.zoomIdentity.translate(tx, ty).scale(k);
  } else {
    const [[lonW, latN], [lonE, latS]] = r.bounds;
    const [svgNW, svgSE] = [projection([lonW, latN]), projection([lonE, latS])];
    const pad = 20;
    const x0 = svgNW[0] - pad, y0 = svgNW[1] - pad;
    const x1 = svgSE[0] + pad, y1 = svgSE[1] + pad;
    const bw = x1 - x0, bh = y1 - y0;
    const k = Math.min(W / bw, H / bh);
    transform = d3.zoomIdentity.translate(W/2 - k*(x0+bw/2), H/2 - k*(y0+bh/2)).scale(k);
  }
  svg.transition().duration(1000).call(zoom.transform, transform);
}

// ── State & initial render ────────────────────────────────────────────────────
let regionKey = 'uefa';
let phase     = 'before';

// Apply region-specific state: dim overlay + flags + regional opacity.
// Phase visibility is orthogonal — managed by updatePhaseVisibility().
function applyState() {
  const region = REGIONS[regionKey];
  updateDimOverlay(region.ids);
  renderFlags(phase);
  applyRegionOpacity(region.ids);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function syncLabels(switchEl) {
  const [left, right] = switchEl.closest('.d-flex').querySelectorAll('.switch-label');
  left.classList.toggle('fw-bold', !switchEl.checked);
  right.classList.toggle('fw-bold',  switchEl.checked);
}

const selRegion = document.getElementById('select-region');
const swPhase   = document.getElementById('switch-phase');
const btnWorld  = document.getElementById('btn-world');

function enterWorldMode() {
  btnWorld.classList.remove('btn-outline-secondary');
  btnWorld.classList.add('btn-secondary');
  selRegion.value = '';
}

function exitWorldMode() {
  btnWorld.classList.remove('btn-secondary');
  btnWorld.classList.add('btn-outline-secondary');
}

selRegion.addEventListener('change', e => {
  const val = e.target.value;
  if (!val) {
    enterWorldMode();
    dimPaths.transition().duration(500).attr('fill', DIM_CLEAR);
    g.selectAll('path.country-uk-dim').transition().duration(500).attr('fill', DIM_CLEAR);
    flagsG.selectAll('.flag-qualified').transition().duration(500).attr('opacity', 1);
    zoomToWorld();
  } else {
    regionKey = val;
    exitWorldMode();
    applyState();
    zoomToRegion(regionKey);
  }
});
swPhase.addEventListener('change', e => {
  phase = e.target.checked ? 'after' : 'before';
  syncLabels(e.target);
  updatePhaseVisibility(true);
});

document.getElementById('switch-phase-group').querySelectorAll('.switch-label').forEach((label, i) => {
  label.addEventListener('click', () => {
    const wantChecked = i === 1;
    if (swPhase.checked !== wantChecked) {
      swPhase.checked = wantChecked;
      swPhase.dispatchEvent(new Event('change'));
    }
  });
});

syncLabels(swPhase);

// Initial state: world mode — must come after const declarations above.
const _params    = new URLSearchParams(location.search);
const VIDEO_MODE = _params.has('video');
enterWorldMode();
dimPaths.attr('fill', DIM_CLEAR);
if (!VIDEO_MODE) renderFlags('before', true); // staggered animated reveal

// Pre-select confederation from ?region=<key> (linked from main map dropdown)
const _regionParam = _params.get('region');
if (!VIDEO_MODE && _regionParam && REGIONS[_regionParam]) {
  regionKey = _regionParam;
  selRegion.value = _regionParam;
  exitWorldMode();
  applyState();
  zoomToRegion(regionKey);
}

// ── Unzoom button ─────────────────────────────────────────────────────────────
function zoomToWorld() {
  svg.transition().duration(900).call(zoom.transform, d3.zoomIdentity);
}
btnWorld.addEventListener('click', () => {
  enterWorldMode();
  dimPaths.transition().duration(500).attr('fill', DIM_CLEAR);
  g.selectAll('path.country-uk-dim').transition().duration(500).attr('fill', DIM_CLEAR);
  g.selectAll('path.country').each(function() {
    d3.select(this).attr('fill', choroFill(+this.getAttribute('data-id'), byId));
  });
  g.selectAll('path.country-uk').each(function() {
    d3.select(this).attr('fill', choroFill(+this.getAttribute('data-id'), byId));
  });
  flagsG.selectAll('.flag-qualified').transition().duration(500).attr('opacity', 1);
  zoomToWorld();
});

// ── Video / intro API ─────────────────────────────────────────────────────────
function clearMapForIntro() {
  flagsG.selectAll('*').remove();
  g.selectAll('path.country, path.country-uk').attr('fill', '#e8e4e0');
  dimPaths.attr('fill', DIM_CLEAR);
  g.selectAll('path.country-uk-dim').attr('fill', DIM_CLEAR);
  svg.call(zoom.transform, d3.zoomIdentity);
}

function revealOneFlag(id, iso2) {
  g.selectAll(`path[data-id="${id}"]`).attr('fill', choroFill(id, byId));
  const c = centroids[id];
  if (!c || !isFinite(c[0])) return;
  const k = d3.zoomTransform(svg.node()).k;
  const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
  const [cx, cy] = c;
  flagsG.append('image')
    .classed('flag-qualified', true)
    .attr('data-cx', cx).attr('data-cy', cy)
    .attr('href', FLAG_CDN(iso2))
    .attr('x', cx - s/2).attr('y', cy - s/2)
    .attr('width', s).attr('height', s)
    .attr('clip-path', 'inset(0% round 50%)')
    .attr('opacity', 1);
}

function getQualifiedByEloAsc() {
  return ALL_QUALIFIED
    .map(q => {
      const r = eloData.rankings.find(e => e.id === q.id);
      return { id: q.id, iso2: q.iso2, rank: r?.rank ?? 9999 };
    })
    .sort((a, b) => b.rank - a.rank); // weakest (highest rank number) first
}

function showR32Closing() {
  // Restore all choropleth colors
  g.selectAll('path.country').each(function() {
    d3.select(this).attr('fill', choroFill(+this.getAttribute('data-id'), byId));
  });
  g.selectAll('path.country-uk').each(function() {
    d3.select(this).attr('fill', choroFill(+this.getAttribute('data-id'), byId));
  });
  dimPaths.attr('fill', DIM_CLEAR);
  g.selectAll('path.country-uk-dim').attr('fill', DIM_CLEAR);
  // Render all qualified flags: R32 at full opacity, others faded
  flagsG.selectAll('*').remove();
  const k = 1;
  const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
  for (const { id, iso2 } of ALL_QUALIFIED) {
    const c = centroids[id];
    if (!c || !isFinite(c[0])) continue;
    const [cx, cy] = c;
    flagsG.append('image')
      .classed('flag-qualified', true)
      .attr('data-cx', cx).attr('data-cy', cy)
      .attr('href', FLAG_CDN(iso2))
      .attr('x', cx - s/2).attr('y', cy - s/2)
      .attr('width', s).attr('height', s)
      .attr('clip-path', 'inset(0% round 50%)')
      .attr('opacity', (_alive && !_alive.has(iso2)) ? 0.12 : 1);
  }
  svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity);
}

window._perf = {
  clearMapForIntro,
  revealOneFlag,
  getQualifiedByEloAsc,
  showR32Closing,
  zoomToWorld,
  applyState,
  zoomToRegion,

  // ── Video API ────────────────────────────────────────────────────────────────
  showFlags(animate = true) {
    renderFlags('before', animate);
  },

  zoomToME() {
    // Video-specific: ME sub-region within AFC, not a confederation
    const ME_IDS = new Set([
      51, 31, 48, 196, 268, 364, 368, 376, 400, 414,
      422, 275, 512, 634, 682, 760, 792, 784, 860, 887,
    ]);
    const ME_ZOOM = [8.2417, -4116.80, -1145.81];
    exitWorldMode();
    regionKey = 'afc'; // closest confederation
    selRegion.value = 'afc';
    updateDimOverlay(ME_IDS);
    applyRegionOpacity(ME_IDS);
    const [k, tx, ty] = ME_ZOOM;
    svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
  },

  zoomToAfrica() {
    exitWorldMode();
    regionKey = 'caf';
    selRegion.value = 'caf';
    // Re-render all flags (restores any vanished ME flags)
    renderFlags('before', false, REGIONS.caf.ids);
    updateDimOverlay(REGIONS.caf.ids);
    zoomToRegion('caf');
  },

  showWorldKnockout() {
    enterWorldMode();
    showR32Closing();
  },

  pulseFlag(iso2) {
    const flag = flagsG.select(`.flag-qualified[data-iso2="${iso2}"]`);
    if (flag.empty() || flag.style('display') === 'none') return;
    if (+flag.attr('opacity') < 1) return;
    const k = d3.zoomTransform(svg.node()).k;
    const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
    animateFlagPulse(flag.node(), s, +flag.attr('data-cx'), +flag.attr('data-cy'));
  },

  vanishFlagByIso2(iso2, delay = 0) {
    const flag = flagsG.select(`.flag-qualified[data-iso2="${iso2}"]`);
    if (flag.empty()) return;
    const k = d3.zoomTransform(svg.node()).k;
    const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
    animateFlagOut(flag.node(), s, +flag.attr('data-cx'), +flag.attr('data-cy'), delay);
  },
};
</script>
</body>
</html>
