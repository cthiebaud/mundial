<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional performance · World Cup 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
body { background: #faf9f6; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

#header {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 10px 20px; background: #faf9f6;
  border-bottom: 1px solid #e4e0d8; flex-shrink: 0;
}
#header h1 { font-size: .95rem; font-weight: 600; color: #333; flex: 1; margin: 0; }

#controls { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.switch-label { font-size: .82rem; color: #555; user-select: none; white-space: nowrap; }


#map-wrap { flex: 1; position: relative; overflow: hidden; }
world-map { display: block; width: 100%; height: 100%; }
world-map svg { width: 100%; height: 100%; touch-action: none; }
</style>
</head>
<body>

<div id="header">
  <h1 id="title">Performance at the World Cup 2026</h1>
  <div id="controls">
    <div class="d-flex align-items-center gap-2">
      <span class="switch-label">Middle East</span>
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" role="switch" id="switch-region">
      </div>
      <span class="switch-label">Africa</span>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="switch-label">Qualified</span>
      <div class="form-check form-switch mb-0">
        <input class="form-check-input" type="checkbox" role="switch" id="switch-phase">
      </div>
      <span class="switch-label">Round of 32</span>
    </div>
  </div>
</div>
<div id="map-wrap">
  <world-map></world-map>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script type="module">
import { choroFill, FLAG_CDN, FLAG, FLAG_SIZE_ZOOM_EXP, W, H } from '../js/map-container.js';
import { QUALIFIED_BY_NAME, QUALIFIED_NAMES, buildAliveAndKicking } from '../js/qualified.js';

// ── Region definitions ────────────────────────────────────────────────────────
const REGIONS = {
  me: {
    label: 'Middle East',
    ids: new Set([
      51, 31, 48, 196, 268,   // Armenia, Azerbaijan, Bahrain, Cyprus, Georgia
      364, 368, 376, 400, 414, // Iran, Iraq, Israel, Jordan, Kuwait
      422, 275, 512, 634, 682, // Lebanon, Palestine, Oman, Qatar, Saudi Arabia
      760, 792, 784, 860, 887, // Syria, Turkey, UAE, Uzbekistan, Yemen
    ]),
    // Exact transform from console tuning — paste new values here to adjust
    zoom: [8.2417, -4116.80, -1145.81],
  },
  africa: {
    label: 'Africa',
    ids: new Set([
      12, 24, 72, 108, 120, 132, 140, 148, 174, 178, 180, 204, 226, 231, 232,
      262, 266, 270, 288, 324, 384, 404, 426, 430, 434, 450, 454, 466, 478,
      480, 504, 508, 516, 562, 566, 624, 646, 678, 686, 690, 694, 706, 710,
      716, 728, 729, 748, 768, 788, 800, 818, 834, 854, 894,
      // Algeria, Angola, Botswana, Burundi, Cameroon, Cape Verde, CAR, Chad,
      // Comoros, Congo(Rep.), DR Congo, Benin, Equatorial Guinea, Ethiopia, Eritrea,
      // Djibouti, Gabon, Gambia, Ghana, Guinea, Ivory Coast, Kenya, Lesotho,
      // Liberia, Libya, Madagascar, Malawi, Mali, Mauritania, Mauritius,
      // Morocco, Mozambique, Namibia, Niger, Nigeria, Guinea-Bissau, Rwanda,
      // São Tomé, Senegal, Seychelles, Sierra Leone, Somalia, South Africa,
      // Zimbabwe, South Sudan, Sudan, Eswatini, Togo, Tunisia, Uganda,
      // Egypt, Tanzania, Burkina Faso, Zambia
    ]),
    zoom: [3.9699, -1449.54, -731.49],
  },
};

// ── Standalone flag positions (countries absent from 110m topojson) ───────────
const STANDALONE = [
  { id: 132, lon: -27.6, lat: 19.1 }, // Cape Verde  (flag offset into Atlantic)
  { id: 531, lon: -65.0, lat: 16.2 }, // Curaçao    (flag offset north in Caribbean)
];

// ── Map infrastructure ────────────────────────────────────────────────────────
const _wm = document.querySelector('world-map');
const { svg, g, projection, path, zoom } = _wm;

_wm.onZoom = e => {
  const { x, y, k } = e.transform;
  console.log(`zoom  k=${k.toFixed(4)}  tx=${x.toFixed(2)}  ty=${y.toFixed(2)}`);
};

// ── Data ─────────────────────────────────────────────────────────────────────
const [mapData, eloData, r32Data, world, ukNations] = await Promise.all([
  fetch('../data/wc2026_map_data.json').then(r => r.json()),
  fetch('../data/wc2026_elo_rank.json').then(r => r.json()),
  fetch('../data/wc2026_r32_teams.json').then(r => r.json()).catch(() => null),
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
  fetch('../data/uk-nations.geojson').then(r => r.json()),
]);

// ── Build byId (identical coloring to main map) ───────────────────────────────
const nativeByCountry = {};
if (mapData.natives) {
  Object.entries(mapData.natives).forEach(([name, players]) => {
    const nId = QUALIFIED_BY_NAME[name];
    if (nId != null) nativeByCountry[nId] = players;
  });
}
const byId = {};
(mapData.data ?? []).forEach(d => {
  d.ratio = d.count + (nativeByCountry[d.id]?.length ?? 0);
  byId[d.id] = d;
});
Object.entries(nativeByCountry).forEach(([nId, players]) => {
  const id = +nId;
  if (byId[id]) return;
  byId[id] = { id, ratio: players.length };
});

const _alive = buildAliveAndKicking(r32Data);

const ALL_QUALIFIED = eloData.rankings
  .filter(r => QUALIFIED_NAMES[r.id] && r.iso2)
  .map(r => ({ id: r.id, iso2: r.iso2.toLowerCase() }));

// ── Patch Kosovo ─────────────────────────────────────────────────────────────
world.objects.countries.geometries.forEach(geo => {
  if (!geo.id && geo.properties?.name === 'Kosovo') geo.id = 383;
});

// ── Choropleth ────────────────────────────────────────────────────────────────
g.append('path').datum({ type: 'Sphere' })
  .attr('d', path).attr('fill', '#b8d8ea').attr('stroke', 'none');
g.append('path').datum(d3.geoGraticule()())
  .attr('d', path).attr('fill', 'none').attr('stroke', '#ccc4dc').attr('stroke-width', .25);

const countries = topojson.feature(world, world.objects.countries);
const UK_IDS = { ENG: 8260, SCT: 8261, WLS: 8262, NIR: 8263 };

g.selectAll('path.country')
  .data(countries.features.filter(d => +d.id !== 826))
  .join('path').attr('class', 'country').attr('d', path)
    .attr('data-id', d => +d.id)
    .attr('fill', d => choroFill(+d.id, byId))
    .attr('stroke', '#ccc8c0').attr('stroke-width', .3);

g.selectAll('path.country-uk')
  .data(ukNations.features)
  .join('path').attr('class', 'country country-uk').attr('d', path)
    .attr('fill', d => choroFill(UK_IDS[d.properties.GU_A3], byId))
    .attr('stroke', '#ccc8c0').attr('stroke-width', .3);

g.append('path')
  .datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b))
  .attr('fill', 'none').attr('stroke', '#b8b0a8').attr('stroke-width', .3).attr('d', path);

// ── Dim overlay (updated on region change) ────────────────────────────────────
const DIM_FILL = 'rgba(250,249,246,0.72)';
const dimPaths = g.selectAll('path.country-dim')
  .data(countries.features.filter(d => +d.id !== 826))
  .join('path').attr('class', 'country-dim').attr('d', path)
    .attr('stroke', 'none').attr('pointer-events', 'none');

// UK nations are never in a region set — always dimmed
g.selectAll('path.country-uk-dim')
  .data(ukNations.features)
  .join('path').attr('class', 'country-uk-dim').attr('d', path)
    .attr('fill', DIM_FILL).attr('stroke', 'none').attr('pointer-events', 'none');

function updateDimOverlay(regionIds) {
  dimPaths.attr('fill', d => regionIds.has(+d.id) ? 'none' : DIM_FILL);
}

// ── Centroids ─────────────────────────────────────────────────────────────────
const CENTROID_OVERRIDE = { 250: [2.5, 46.5], 840: [-98, 38], 8261: [-4.2, 56.8], 191: [16.8, 45.8] };
const centroids = {};
countries.features.forEach(f => {
  if (!f.id) return;
  const ov = CENTROID_OVERRIDE[+f.id];
  centroids[+f.id] = ov ? projection(ov) : path.centroid(f);
});
const UK_CENTROID_IDS = { ENG: 8260, SCT: 8261, WLS: 8262, NIR: 8263 };
ukNations.features.forEach(f => {
  const id = UK_CENTROID_IDS[f.properties.GU_A3];
  if (!id) return;
  const ov = CENTROID_OVERRIDE[id];
  centroids[id] = ov ? projection(ov) : path.centroid(f);
});
// Standalone countries absent from topojson
STANDALONE.forEach(({ id, lon, lat }) => { centroids[id] = projection([lon, lat]); });

// ── Flags ─────────────────────────────────────────────────────────────────────
const flagsG = g.append('g').attr('class', 'flags');

function renderFlags(regionIds, phase) {
  flagsG.selectAll('*').remove();
  const k = d3.zoomTransform(svg.node()).k;
  const s = FLAG / Math.pow(k, 1 - FLAG_SIZE_ZOOM_EXP);
  for (const { id, iso2 } of ALL_QUALIFIED) {
    const isAlive = _alive ? _alive.has(iso2) : true;
    if (phase === 'after' && !isAlive) continue;
    const c = centroids[id];
    if (!c || !isFinite(c[0])) continue;
    const [cx, cy] = c;
    flagsG.append('image')
      .classed('flag-qualified', true)
      .attr('data-cx', cx).attr('data-cy', cy)
      .attr('href', FLAG_CDN(iso2))
      .attr('x', cx - s/2).attr('y', cy - s/2)
      .attr('width', s).attr('height', s)
      .attr('clip-path', 'inset(0% round 50%)')
      .attr('opacity', regionIds.has(id) ? 1 : 0.28);
  }
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
function zoomToRegion(regionKey) {
  const r = REGIONS[regionKey];
  let transform;
  if (r.zoom) {
    const [k, tx, ty] = r.zoom;
    transform = d3.zoomIdentity.translate(tx, ty).scale(k);
  } else {
    const [[lonW, latN], [lonE, latS]] = r.bounds;
    const [svgNW, svgSE] = [projection([lonW, latN]), projection([lonE, latS])];
    const pad = 20;
    const x0 = svgNW[0] - pad, y0 = svgNW[1] - pad;
    const x1 = svgSE[0] + pad, y1 = svgSE[1] + pad;
    const bw = x1 - x0, bh = y1 - y0;
    const k = Math.min(W / bw, H / bh);
    transform = d3.zoomIdentity.translate(W/2 - k*(x0+bw/2), H/2 - k*(y0+bh/2)).scale(k);
  }
  svg.transition().duration(600).call(zoom.transform, transform);
}

// ── State & initial render ────────────────────────────────────────────────────
let regionKey = 'me';
let phase     = 'before';

function applyState() {
  const region = REGIONS[regionKey];
  document.getElementById('title').textContent =
    `${region.label} performance at the World Cup 2026`;
  updateDimOverlay(region.ids);
  renderFlags(region.ids, phase);
}

applyState();
zoomToRegion(regionKey);

// ── Toggle handlers ───────────────────────────────────────────────────────────
function syncLabels(switchEl) {
  const [left, right] = switchEl.closest('.d-flex').querySelectorAll('.switch-label');
  left.classList.toggle('fw-bold', !switchEl.checked);
  right.classList.toggle('fw-bold',  switchEl.checked);
}

const swRegion = document.getElementById('switch-region');
const swPhase  = document.getElementById('switch-phase');

swRegion.addEventListener('change', e => {
  regionKey = e.target.checked ? 'africa' : 'me';
  syncLabels(e.target);
  applyState();
  zoomToRegion(regionKey);
});
swPhase.addEventListener('change', e => {
  phase = e.target.checked ? 'after' : 'before';
  syncLabels(e.target);
  applyState();
});

syncLabels(swRegion);
syncLabels(swPhase);
</script>
</body>
</html>
