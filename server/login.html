<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial · Sign In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
body { background: #f5f2ec; }
</style>
</head>
<body>

<div class="container py-4" style="max-width: 420px">
  <h1 class="fs-5 fw-bold mb-4 text-center">Mundial</h1>

  <!-- Not signed in -->
  <div id="signed-out" class="text-center">
    <p class="text-muted mb-3">Sign in to continue</p>
    <div id="g_id_onload"
         data-client_id="657438044008-qddq7m5mgk59k8qnhjpd6dalndqqb50e.apps.googleusercontent.com"
         data-callback="onGoogleSignIn"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin d-inline-block" data-type="standard" data-size="large" data-theme="outline"></div>
  </div>

  <!-- Signed in -->
  <div id="signed-in" class="d-none">
    <div class="card">
      <div class="card-body d-flex align-items-center gap-3">
        <img id="user-pic" class="rounded-circle" width="48" height="48" alt="">
        <div class="flex-grow-1">
          <div id="user-name" class="fw-bold"></div>
          <div id="user-email" class="text-muted small"></div>
        </div>
        <button id="logout-btn" class="btn btn-outline-secondary btn-sm">Sign out</button>
      </div>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const BACKEND = window.location.origin;

async function onGoogleSignIn(response) {
  const r = await fetch(`${BACKEND}/api/auth/google`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    credentials: 'include',
    body: JSON.stringify({credential: response.credential})
  });
  const data = await r.json();
  if (data.user) {
    showUser(data.user);
    // If opened as popup, notify parent and close
    if (window.opener) {
      window.opener.postMessage({type: 'mundial_auth', user: data.user, admin: data.admin}, '*');
      setTimeout(() => window.close(), 500);
    }
  }
}

async function checkSession() {
  try {
    const r = await fetch(`${BACKEND}/api/auth/me`, {credentials: 'include'});
    const data = await r.json();
    if (data.user) showUser(data.user);
  } catch {}
}

function showUser(user) {
  document.getElementById('signed-out').classList.add('d-none');
  document.getElementById('signed-in').classList.remove('d-none');
  document.getElementById('user-pic').src = user.picture;
  document.getElementById('user-name').textContent = user.name;
  document.getElementById('user-email').textContent = user.email;
}

document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch(`${BACKEND}/api/auth/logout`, {method: 'POST', credentials: 'include'});
  document.getElementById('signed-in').classList.add('d-none');
  document.getElementById('signed-out').classList.remove('d-none');
});

checkSession();
</script>
</body>
</html>
