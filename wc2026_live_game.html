<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mondial 2026 · Live Game</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css">
<style>
body { background: #f5f2ec; }
.player-num { width: 2em; text-align: right; font-weight: 700; }
.player-pos { width: 1.5em; text-align: center; color: #888; }
.team-flag { width: 32px; height: 24px; border-radius: 3px; }
.lineup-card { min-width: 280px; }
.sub { color: #888; }
.evt { font-size: 12px; padding: 3px 0; border-bottom: 1px solid #eee; }
.evt:last-child { border-bottom: none; }
.evt-min { width: 3em; text-align: right; font-weight: 700; color: #888; }
.evt-icon { width: 1.5em; text-align: center; }
.evt-goal { color: #198754; }
.evt-card-yellow { color: #ffc107; }
.evt-card-red { color: #dc3545; }
.evt-subst { color: #0d6efd; }
.evt-var { color: #6f42c1; }
.stat-row { font-size: 12px; padding: 2px 0; }
.stat-label { text-align: center; color: #888; flex: 0 0 auto; width: 110px; }
.stat-val { font-weight: 600; min-width: 2.5em; }
.stat-bar-wrap { flex: 1; height: 6px; background: #eee; border-radius: 3px; }
.stat-bar { height: 100%; border-radius: 3px; }
.stat-bar-home { background: #0d6efd; }
.stat-bar-away { background: #dc3545; }
.grp-table { font-size: 12px; margin-bottom: 0; }
.grp-table th { font-weight: 600; color: #888; padding: 2px 6px !important; white-space: nowrap; }
.grp-table td { padding: 3px 6px !important; white-space: nowrap; }
.grp-table .grp-team { text-align: left; min-width: 100px; }
.grp-table .grp-num { text-align: center; min-width: 24px; }
.grp-table .grp-gfga { text-align: center; min-width: 24px; }
@media (max-width: 575.98px) { .grp-gfga { display: none; } }
.grp-table .grp-pts { font-weight: 700; }
.grp-qualify { background: rgba(25, 135, 84, 0.06); }
.grp-maybe { background: rgba(255, 193, 7, 0.08); }
.grp-playing { background: rgba(13, 110, 253, 0.04); }
.grp-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
.grp-result { font-size: 12px; padding: 4px 0; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 4px; }
.grp-result-home { text-align: right; flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
.grp-result-away { text-align: left; flex: 1; display: flex; align-items: center; gap: 4px; }
.grp-result-score { font-weight: 700; background: #555; color: #fff; border-radius: 3px; padding: 1px 5px; min-width: 1.3em; text-align: center; flex-shrink: 0; }
.grp-results-title { font-size: 11px; color: #999; cursor: pointer; }
.fix-pill { cursor: pointer; border: 1px solid #dee2e6; border-radius: 20px; padding: 4px 12px; font-size: 12px; background: #fff; transition: all .15s; white-space: nowrap; }
.fix-pill:hover { border-color: #999; }
.fix-pill.active { background: #1C274C; color: #fff; border-color: #1C274C; }
</style>
</head>
<body>
<script type="module" src="js/auth-bar.js"></script>
<mundial-auth-bar></mundial-auth-bar>

<div id="main-content" class="container-xxl py-4">
  <div class="d-flex align-items-start gap-2 mb-3">
    <div>
      <h1 id="live-title" class="fs-5 fw-bold mb-0">Live Game</h1>
      <p id="live-subtitle" class="text-muted small mb-0">World Cup 2026</p>
    </div>
    <div class="ms-auto d-flex flex-column align-items-end gap-1">
      <span class="d-flex align-items-center gap-1">
        <span id="ws-status" class="badge bg-secondary">connecting…</span>
        <button id="ws-retry" class="btn btn-sm btn-outline-warning d-none" style="font-size:11px;padding:2px 8px">↻</button>
      </span>
      <a href="https://dashboard.api-football.com/" target="_blank" rel="noopener" class="btn btn-light btn-sm text-muted text-decoration-none fs-6 lh-1 px-2 py-1">API</a>
    </div>
  </div>

  <div id="fix-selector" class="d-flex gap-2 mb-3 d-none"></div>
  <div id="group-standings" class="mb-3"></div>
  <div id="no-match" class="alert alert-secondary d-none">No World Cup match currently live.</div>
  <div id="matches"></div>
  <div id="loading" class="text-muted small">Connecting to backend…</div>
</div>

<script type="module">
import { T } from './js/i18n.js';

document.getElementById('live-title').textContent = T.liveTitle(0);
document.getElementById('live-subtitle').textContent = T.liveSubtitle;
document.getElementById('ws-status').textContent = T.liveBadgeConnecting;
document.getElementById('no-match').textContent = T.liveNoMatch;
document.getElementById('loading').textContent = T.liveConnecting;

let PROXY;
const authBar = document.querySelector('mundial-auth-bar');

const _waitForBackend = () => new Promise(resolve => {
  if (authBar.BACKEND && authBar.socket?.connected) {
    resolve({ backend: authBar.BACKEND, socket: authBar.socket });
    return;
  }
  const onOnline = (e) => {
    authBar.removeEventListener('auth-bar-online', onOnline);
    authBar.removeEventListener('auth-bar-ready', onReady);
    resolve(e.detail);
  };
  const onReady = (e) => {
    authBar.removeEventListener('auth-bar-ready', onReady);
    PROXY = e.detail.backend;
    if (authBar.socket?.connected) {
      authBar.removeEventListener('auth-bar-online', onOnline);
      resolve({ backend: e.detail.backend, socket: authBar.socket });
    }
  };
  authBar.addEventListener('auth-bar-online', onOnline);
  authBar.addEventListener('auth-bar-ready', onReady);
});

const loadingEl = document.getElementById('loading');
const badgeEl = document.getElementById('ws-status');

const retryBtn = document.getElementById('ws-retry');

authBar.addEventListener('auth-bar-offline', () => {
  badgeEl.textContent = T.liveNoBackend;
  badgeEl.className = 'badge bg-warning text-dark';
  loadingEl.textContent = T.liveNotRunning;
  loadingEl.classList.remove('d-none');
  retryBtn.classList.remove('d-none');
});

authBar.addEventListener('auth-bar-online', () => {
  retryBtn.classList.add('d-none');
});

retryBtn.addEventListener('click', () => {
  retryBtn.classList.add('d-none');
  badgeEl.textContent = T.liveBadgeConnecting;
  badgeEl.className = 'badge bg-secondary';
  loadingEl.textContent = T.liveConnecting;
  authBar._init();
});

const { backend, socket: sock } = await _waitForBackend();
PROXY = backend;

// Build name → birth_country lookup from our data with fuzzy matching
const mapData = await fetch('./data/wc2026_map_data.json').then(r => r.json());
const _norm = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
const _exactBC = {};    // exact name → birth_country
const _normBC = {};     // normalized name → birth_country
const _lastNameBC = {}; // normalized last name → birth_country (only if unique)
const _lastNameConflict = new Set();

for (const rec of mapData.data) {
  for (const p of rec.players) {
    _exactBC[p.name] = rec.country;
    _normBC[_norm(p.name)] = rec.country;
    const last = _norm(p.name.split(' ').pop());
    if (_lastNameBC[last] && _lastNameBC[last] !== rec.country) _lastNameConflict.add(last);
    _lastNameBC[last] = rec.country;
  }
}

const getBirthCountry = (apiName) => {
  if (_exactBC[apiName]) return _exactBC[apiName];
  const n = _norm(apiName);
  if (_normBC[n]) return _normBC[n];
  // Try last name only (API often uses "K. Mbappé" or just "Mbappé")
  const last = _norm(apiName.split(' ').pop());
  if (_lastNameBC[last] && !_lastNameConflict.has(last)) return _lastNameBC[last];
  // Try if any normalized key contains or is contained by the API name
  for (const [key, country] of Object.entries(_normBC)) {
    if (key.includes(n) || n.includes(key)) return country;
  }
  return null;
};

const flagCode = name => {
  const MAP = {
    'Germany':'de','Ivory Coast':'ci','France':'fr','Brazil':'br','Argentina':'ar',
    'England':'gb-eng','Scotland':'gb-sct','Wales':'gb-wls','Northern Ireland':'gb-nir',
    'Spain':'es','Portugal':'pt','Netherlands':'nl','Belgium':'be','Italy':'it',
    'Croatia':'hr','Denmark':'dk','Switzerland':'ch','Uruguay':'uy','Colombia':'co',
    'Mexico':'mx','United States':'us','USA':'us','Canada':'ca','Japan':'jp',
    'South Korea':'kr','Australia':'au','Saudi Arabia':'sa','Iran':'ir','Qatar':'qa',
    'Morocco':'ma','Senegal':'sn','Ghana':'gh','Cameroon':'cm','Nigeria':'ng',
    'Tunisia':'tn','Egypt':'eg','Algeria':'dz','Ecuador':'ec','Paraguay':'py',
    'Chile':'cl','Peru':'pe','Bolivia':'bo','Venezuela':'ve','Costa Rica':'cr',
    'Honduras':'hn','Panama':'pa','Jamaica':'jm','Haiti':'ht','Trinidad And Tobago':'tt',
    'Serbia':'rs','Poland':'pl','Austria':'at','Czech Republic':'cz','Romania':'ro',
    'Ukraine':'ua','Turkey':'tr','Greece':'gr','Hungary':'hu','Norway':'no',
    'Sweden':'se','Finland':'fi','Iceland':'is','Ireland':'ie','Albania':'al',
    'Bosnia and Herzegovina':'ba','Montenegro':'me','North Macedonia':'mk',
    'Slovenia':'si','Slovakia':'sk','Georgia':'ge','New Zealand':'nz',
    'China':'cn','Indonesia':'id','India':'in','Iraq':'iq','Jordan':'jo',
    'Uzbekistan':'uz','Palestine':'ps','Syria':'sy','Bahrain':'bh','Oman':'om',
    'Kuwait':'kw','Cape Verde':'cv','DR Congo':'cd','Mali':'ml',
    'Burkina Faso':'bf','Guinea':'gn','Mozambique':'mz','Tanzania':'tz',
    'South Africa':'za','Kenya':'ke','Uganda':'ug','Zimbabwe':'zw',
    'Zambia':'zm','Angola':'ao','Benin':'bj','Togo':'tg','Niger':'ne',
    'Congo':'cg','Gabon':'ga','Comoros':'km','Madagascar':'mg',
    'Mauritania':'mr','Namibia':'na','Rwanda':'rw','Sierra Leone':'sl',
    'Korea Republic':'kr','Türkiye':'tr','Czechia':'cz',
  };
  return MAP[name] ?? name.toLowerCase().slice(0, 2);
};

const posLabel = pos => ({G:'GK', D:'DF', M:'MF', F:'FW'}[pos] ?? pos ?? '');

const renderTeam = (lineup, side) => {
  const team = lineup.team;
  const formation = lineup.formation ?? '?';
  const iso = flagCode(team.name);

  const playerRow = (p, isSub) => {
    const born = getBirthCountry(p.name);
    const isForeign = born && born !== team.name;
    const bornTag = isForeign ? ` <span class="fi fi-${flagCode(born)}" style="font-size:10px" title="${T.liveBornIn(born)}"></span>` : '';
    return `
    <tr class="${isSub ? 'sub' : ''}">
      <td class="player-num">${p.number}</td>
      <td class="player-pos"><small>${posLabel(p.pos)}</small></td>
      <td>${p.name}${bornTag}</td>
    </tr>`;
  };

  return `
    <div class="lineup-card card flex-fill">
      <div class="card-header d-flex align-items-center gap-2 ${side === 'home' ? '' : 'flex-row-reverse'}">
        <span class="fi fi-${iso} team-flag"></span>
        <span class="fw-bold">${team.name}</span>
        <span class="text-muted ms-auto">${formation}</span>
      </div>
      <div class="card-body p-0">
        ${lineup.coach ? (() => {
          const c = lineup.coach;
          const born = getBirthCountry(c.name);
          const isForeign = born && born !== team.name;
          const bornTag = isForeign ? ` <span class="fi fi-${flagCode(born)}" style="font-size:10px" title="${T.liveBornIn(born)}"></span>` : '';
          return `<div class="d-flex align-items-center gap-2 px-3 py-2 border-bottom" style="background:#fafaf7">
            <img src="${c.photo}" class="rounded-circle" width="28" height="28" referrerpolicy="no-referrer" alt="">
            <span class="small">${c.name}${bornTag}</span>
            <span class="text-muted small ms-auto">${T.liveCoach}</span>
          </div>`;
        })() : ''}
        <table class="table table-sm mb-0">
          <tbody>
            <tr><td colspan="3" class="fw-bold small text-muted px-3 pt-2">${T.liveStartXI}</td></tr>
            ${lineup.startXI.map(p => playerRow(p.player, false)).join('')}
            <tr><td colspan="3" class="fw-bold small text-muted px-3 pt-2">${T.liveSubs}</td></tr>
            ${(lineup.substitutes ?? []).map(p => playerRow(p.player, true)).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
};

const renderEvent = (evt) => {
  const min = evt.time.elapsed + (evt.time.extra ? '+' + evt.time.extra : '');
  const player = evt.player?.name ?? '';
  const assist = evt.assist?.name;
  let icon = '', cls = '', detail = '';

  if (evt.type === 'Goal') {
    icon = '⚽'; cls = 'evt-goal';
    detail = player + (assist ? ` (${assist})` : '') + (evt.detail !== 'Normal Goal' ? ` · ${evt.detail}` : '');
  } else if (evt.type === 'Card') {
    const isRed = evt.detail?.includes('Red');
    icon = isRed ? '🟥' : '🟨';
    cls = isRed ? 'evt-card-red' : 'evt-card-yellow';
    detail = player;
  } else if (evt.type === 'subst') {
    icon = '🔄'; cls = 'evt-subst';
    detail = `${assist ?? '?'} → ${player}`;
  } else if (evt.type === 'Var') {
    icon = '📺'; cls = 'evt-var';
    detail = `${player} · ${evt.detail ?? 'VAR'}`;
  } else {
    icon = '·';
    detail = `${player} · ${evt.detail ?? evt.type}`;
  }

  return `<div class="evt d-flex align-items-center gap-2 ${cls}">
    <span class="evt-min">${min}'</span>
    <span class="evt-icon">${icon}</span>
    <span class="fi fi-${flagCode(evt.team?.name ?? '')}" style="font-size:10px"></span>
    <span>${detail}</span>
  </div>`;
};

const renderStats = (statistics) => {
  if (!statistics || statistics.length < 2) return '';
  const homeStat = {};
  const awayStat = {};
  for (const s of statistics[0].statistics) homeStat[s.type] = s.value;
  for (const s of statistics[1].statistics) awayStat[s.type] = s.value;
  const types = statistics[0].statistics.map(s => s.type);

  return types.map(type => {
    const hRaw = homeStat[type];
    const aRaw = awayStat[type];
    const hVal = parseFloat(hRaw) || 0;
    const aVal = parseFloat(aRaw) || 0;
    const total = hVal + aVal || 1;
    const hPct = (hVal / total * 100).toFixed(0);
    const aPct = (aVal / total * 100).toFixed(0);
    return `<div class="stat-row d-flex align-items-center gap-2">
      <span class="stat-val text-end">${hRaw ?? 0}</span>
      <div class="stat-bar-wrap"><div class="stat-bar stat-bar-home" style="width:${hPct}%;margin-left:auto"></div></div>
      <span class="stat-label">${T.liveStatLabel(type)}</span>
      <div class="stat-bar-wrap"><div class="stat-bar stat-bar-away" style="width:${aPct}%"></div></div>
      <span class="stat-val">${aRaw ?? 0}</span>
    </div>`;
  }).join('');
};

const renderMatch = (fix, lineups) => {
  const home = fix.teams.home;
  const away = fix.teams.away;
  const score = fix.goals;
  const status = fix.fixture.status;
  const venue = fix.fixture.venue;
  const events = fix.events ?? [];
  const statistics = fix.statistics ?? [];

  const homeISO = flagCode(home.name);
  const awayISO = flagCode(away.name);

  let html = `
    <div class="mb-4">
      <div class="card">
        <div class="card-header">
          <div class="d-flex justify-content-center align-items-center gap-3 py-2">
            <span class="fi fi-${homeISO} team-flag"></span>
            <span class="fw-bold">${home.name}</span>
            <span class="fs-3 fw-bold px-2" style="white-space:nowrap">${score.home ?? '–'} — ${score.away ?? '–'}</span>
            <span class="fw-bold">${away.name}</span>
            <span class="fi fi-${awayISO} team-flag"></span>
          </div>
          <div class="text-center text-muted small">
            ${status.long}${status.elapsed && !['HT','FT','AET','PEN','BT','ET'].includes(status.short) ? ' · ' + status.elapsed + (status.extra ? '+' + status.extra : '') + '\'' : ''}
            ${venue?.city ? ' · ' + venue.city : ''}
          </div>
        </div>
      </div>`;

  const statsHtml = renderStats(statistics);
  const fid = fix.fixture.id;

  html += `<div class="accordion mt-2" id="acc-${fid}">`;

  if (events.length > 0) {
    html += `
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed py-2 small" type="button" data-bs-toggle="collapse" data-bs-target="#acc-events-${fid}">${T.liveEvents ?? 'Events'}</button></h2>
        <div id="acc-events-${fid}" class="accordion-collapse collapse" data-bs-parent="#acc-${fid}">
          <div class="accordion-body py-2 px-3">${events.map(renderEvent).join('')}</div>
        </div>
      </div>`;
  }

  if (statsHtml) {
    html += `
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed py-2 small" type="button" data-bs-toggle="collapse" data-bs-target="#acc-stats-${fid}">${T.liveStats ?? 'Statistics'}</button></h2>
        <div id="acc-stats-${fid}" class="accordion-collapse collapse" data-bs-parent="#acc-${fid}">
          <div class="accordion-body py-2 px-3">${statsHtml}</div>
        </div>
      </div>`;
  }

  if (lineups.length === 2) {
    html += `
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed py-2 small" type="button" data-bs-toggle="collapse" data-bs-target="#acc-lineups-${fid}">${T.liveLineups ?? 'Lineups'}</button></h2>
        <div id="acc-lineups-${fid}" class="accordion-collapse collapse" data-bs-parent="#acc-${fid}">
          <div class="accordion-body py-2 px-3">
            <div class="d-flex gap-3 flex-wrap flex-md-nowrap">
              ${renderTeam(lineups[0], 'home')}
              ${renderTeam(lineups[1], 'away')}
            </div>
          </div>
        </div>
      </div>`;
  }

  html += `</div>`;

  html += `</div>`;
  return html;
};

const lineupsCache = {};
const _h = {'ngrok-skip-browser-warning': '1'};

const fetchLineups = async (fixtureId) => {
  if (lineupsCache[fixtureId]) return lineupsCache[fixtureId];
  try {
    const data = await fetch(`${PROXY}/api/lineups/${fixtureId}`, {headers: _h}).then(r => r.json());
    if (data.length > 0) lineupsCache[fixtureId] = data;
    return data;
  } catch { return []; }
};

let allFixtures = [];
let selectedFixId = null;
let baseStandings = null;
let groupResults = [];

const LIVE_STATUSES = new Set(['1H','2H','HT','ET','BT','P','LIVE','INT']);

const buildTeamToGroup = () => {
  const map = new Map();
  if (!baseStandings) return map;
  for (const group of baseStandings) {
    const groupName = group[0]?.group;
    if (!groupName) continue;
    const m = groupName.match(/Group\s+([A-L])$/);
    if (!m) continue;
    for (const t of group) map.set(t.team.id, m[1]);
  }
  return map;
};

const computeLiveStandings = (fixtures) => {
  if (!baseStandings) return [];
  const teamToGroup = buildTeamToGroup();

  const liveGroups = new Set();
  const liveTeamIds = new Set();
  for (const fix of fixtures) {
    if (!LIVE_STATUSES.has(fix.fixture.status.short)) continue;
    const g = teamToGroup.get(fix.teams.home.id) ?? teamToGroup.get(fix.teams.away.id);
    if (g) {
      liveGroups.add(g);
      liveTeamIds.add(fix.teams.home.id);
      liveTeamIds.add(fix.teams.away.id);
    }
  }
  if (liveGroups.size === 0) return [];

  const results = [];
  for (const group of baseStandings) {
    const groupName = group[0]?.group;
    const m = groupName?.match(/Group\s+([A-L])$/);
    const letter = m ? m[1] : null;
    if (!letter || !liveGroups.has(letter)) continue;

    const teams = group.map(t => ({
      id: t.team.id, name: t.team.name, logo: t.team.logo,
      played: t.all.played, win: t.all.win, draw: t.all.draw, lose: t.all.lose,
      gf: t.all.goals.for, ga: t.all.goals.against,
      pts: t.points, gd: t.goalsDiff,
      playing: liveTeamIds.has(t.team.id),
    }));

    for (const fix of fixtures) {
      if (!LIVE_STATUSES.has(fix.fixture.status.short)) continue;
      const fGroup = teamToGroup.get(fix.teams.home.id);
      if (fGroup !== letter) continue;
      const hId = fix.teams.home.id, aId = fix.teams.away.id;
      const hGoals = fix.goals.home ?? 0, aGoals = fix.goals.away ?? 0;
      const home = teams.find(t => t.id === hId);
      const away = teams.find(t => t.id === aId);
      if (!home || !away) continue;
      home.played++; away.played++;
      home.gf += hGoals; home.ga += aGoals;
      away.gf += aGoals; away.ga += hGoals;
      if (hGoals > aGoals) { home.win++; home.pts += 3; away.lose++; }
      else if (hGoals < aGoals) { away.win++; away.pts += 3; home.lose++; }
      else { home.draw++; home.pts += 1; away.draw++; away.pts += 1; }
      home.gd = home.gf - home.ga;
      away.gd = away.gf - away.ga;
    }

    teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
    results.push({ letter, teams });
  }
  return results;
};

const explainRanking = (teams) => {
  const lines = [];
  let i = 0;
  while (i < teams.length) {
    let j = i + 1;
    while (j < teams.length && teams[j].pts === teams[i].pts) j++;
    if (j - i > 1) {
      const tied = teams.slice(i, j);
      const names = tied.map(t => t.name);
      lines.push(`<strong>${names.join(', ')}</strong> are tied on <strong>${tied[0].pts} pts</strong>.`);
      for (let k = 0; k < tied.length - 1; k++) {
        const a = tied[k], b = tied[k + 1];
        if (a.gd !== b.gd) {
          lines.push(`&ensp;${a.name} ranks above ${b.name}: goal difference ${a.gd > 0 ? '+' : ''}${a.gd} vs ${b.gd > 0 ? '+' : ''}${b.gd}.`);
        } else if (a.gf !== b.gf) {
          lines.push(`&ensp;${a.name} ranks above ${b.name}: goals scored ${a.gf} vs ${b.gf}.`);
        } else {
          lines.push(`&ensp;${a.name} and ${b.name} are identical on GD and GF — head-to-head not yet implemented.`);
        }
      }
    }
    i = j;
  }
  if (lines.length === 0) lines.push('No tiebreakers needed — all teams have different point totals.');
  lines.push(`<hr class="my-2"><div class="text-muted" style="font-size:11px">
    <strong>FIFA tiebreaker rules</strong> (applied in order when teams are tied on points):
    <ol class="mb-0 ps-3 mt-1">
      <li>Head-to-head: points</li>
      <li>Head-to-head: goal difference</li>
      <li>Head-to-head: goals scored</li>
      <li>Overall goal difference</li>
      <li>Overall goals scored</li>
      <li>Fair play score (cards)</li>
      <li>FIFA ranking</li>
    </ol>
  </div>`);
  return lines.join('<br>');
};

const renderGroupResults = (letter, teamToGroup) => {
  const matches = groupResults.filter(f => {
    const g = teamToGroup.get(f.teams.home.id) ?? teamToGroup.get(f.teams.away.id);
    return g === letter;
  });
  if (matches.length === 0) return '';
  matches.sort((a, b) => a.fixture.timestamp - b.fixture.timestamp);
  return matches.map(f => {
    const h = f.teams.home, a = f.teams.away;
    return `<div class="grp-result">
      <span class="grp-result-home">${h.name} <span class="fi fi-${flagCode(h.name)}" style="font-size:12px"></span></span>
      <span class="grp-result-score">${f.goals.home}</span><span class="grp-result-score">${f.goals.away}</span>
      <span class="grp-result-away"><span class="fi fi-${flagCode(a.name)}" style="font-size:12px"></span> ${a.name}</span>
    </div>`;
  }).join('');
};

const renderStandings = (fixtures) => {
  const el = document.getElementById('group-standings');
  const groups = computeLiveStandings(fixtures);
  if (groups.length === 0) { el.innerHTML = ''; return; }
  const teamToGroup = buildTeamToGroup();

  el.innerHTML = groups.map(({ letter, teams }) => {
    const explanation = explainRanking(teams);
    const resultsHtml = renderGroupResults(letter, teamToGroup);
    return `
    <div class="card mb-2">
      <div class="card-body py-2 px-3">
        <div class="grp-title d-flex align-items-center gap-2">
          ${T.liveGroup(letter)}
          <button class="btn btn-link btn-sm p-0 text-muted text-decoration-none" data-bs-toggle="modal" data-bs-target="#grp-modal-${letter}" style="font-size:11px">rules</button>
        </div>
    <div class="modal fade" id="grp-modal-${letter}" tabindex="-1">
      <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title">${T.liveGroup(letter)} — Ranking</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body small">${explanation}</div>
      </div></div>
    </div>
        <table class="table grp-table">
          <thead><tr>
            <th></th><th class="grp-team"></th>
            <th class="grp-num">${T.liveP}</th><th class="grp-num">${T.liveW}</th>
            <th class="grp-num">${T.liveD}</th><th class="grp-num">${T.liveL}</th>
            <th class="grp-num grp-gfga">${T.liveGF}</th><th class="grp-num grp-gfga">${T.liveGA}</th>
            <th class="grp-num">${T.liveGD}</th><th class="grp-num grp-pts">${T.livePts}</th>
          </tr></thead>
          <tbody>${teams.map((t, i) => {
            const cls = i < 2 ? 'grp-qualify' : i === 2 ? 'grp-maybe' : '';
            const playing = t.playing ? 'grp-playing' : '';
            const iso = flagCode(t.name);
            return `<tr class="${cls} ${playing}">
              <td><span class="fi fi-${iso}" style="font-size:14px"></span></td>
              <td class="grp-team">${t.name}</td>
              <td class="grp-num">${t.played}</td><td class="grp-num">${t.win}</td>
              <td class="grp-num">${t.draw}</td><td class="grp-num">${t.lose}</td>
              <td class="grp-num grp-gfga">${t.gf}</td><td class="grp-num grp-gfga">${t.ga}</td>
              <td class="grp-num">${t.gd > 0 ? '+' + t.gd : t.gd}</td>
              <td class="grp-num grp-pts">${t.pts}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
        ${resultsHtml ? `<details class="mt-1"><summary class="grp-results-title">${T.liveResults ?? 'results'}</summary>${resultsHtml}</details>` : ''}
      </div>
    </div>
  `;}).join('');
};

const _accordionState = {};

const _saveAccordionState = () => {
  document.querySelectorAll('#matches .accordion-collapse').forEach(el => {
    const m = el.id.match(/^acc-(events|stats|lineups)-/);
    if (m) _accordionState[m[1]] = el.classList.contains('show');
  });
};

const renderSelectedFixture = async () => {
  const matchesEl = document.getElementById('matches');
  _saveAccordionState();
  const fix = allFixtures.find(f => f.fixture.id === selectedFixId);
  if (!fix) { matchesEl.innerHTML = ''; return; }
  const lineups = await fetchLineups(fix.fixture.id);
  matchesEl.innerHTML = renderMatch(fix, lineups);
  const fid = fix.fixture.id;
  for (const [section, open] of Object.entries(_accordionState)) {
    const el = document.getElementById(`acc-${section}-${fid}`);
    if (!el) continue;
    if (open) {
      el.classList.add('show');
      el.previousElementSibling?.querySelector('.accordion-button')?.classList.remove('collapsed');
    }
  }
};

const renderSelector = () => {
  const sel = document.getElementById('fix-selector');
  if (allFixtures.length <= 1) {
    sel.classList.add('d-none');
    return;
  }
  sel.classList.remove('d-none');
  sel.innerHTML = allFixtures.map(fix => {
    const h = fix.teams.home;
    const a = fix.teams.away;
    const s = fix.fixture.status;
    const active = fix.fixture.id === selectedFixId ? 'active' : '';
    const elapsed = s.elapsed && !['HT','FT','AET','PEN','BT','ET'].includes(s.short) ? ` · ${s.elapsed}${s.extra ? '+' + s.extra : ''}'` : '';
    return `<span class="fix-pill ${active}" data-fid="${fix.fixture.id}">
      <span class="fi fi-${flagCode(h.name)}" style="font-size:11px"></span>
      ${fix.goals.home ?? '–'}–${fix.goals.away ?? '–'}
      <span class="fi fi-${flagCode(a.name)}" style="font-size:11px"></span>${elapsed}
    </span>`;
  }).join('');
  sel.querySelectorAll('.fix-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      selectedFixId = parseInt(pill.dataset.fid);
      renderSelector();
      renderSelectedFixture();
    });
  });
};

const renderFixtures = async (fixtures) => {
  document.getElementById('loading').classList.add('d-none');
  document.getElementById('live-title').textContent = T.liveTitle(fixtures.length);
  allFixtures = fixtures;

  if (fixtures.length === 0) {
    document.getElementById('no-match').classList.remove('d-none');
    document.getElementById('fix-selector').classList.add('d-none');
    document.getElementById('matches').innerHTML = '';
    selectedFixId = null;
    return;
  }

  document.getElementById('no-match').classList.add('d-none');

  if (!selectedFixId || !fixtures.find(f => f.fixture.id === selectedFixId)) {
    selectedFixId = fixtures[0].fixture.id;
  }

  renderSelector();
  renderStandings(fixtures);
  await renderSelectedFixture();
};

const setPollStatus = (active, fixtures = []) => {
  if (active) {
    badgeEl.textContent = fixtures.length > 0 ? `${T.liveLive} · ${T.liveMatches(fixtures.length)}` : T.liveLive;
    badgeEl.className = 'badge bg-success ms-auto';
    document.getElementById('matches').style.opacity = '';
  } else {
    badgeEl.textContent = T.liveLastKnown;
    badgeEl.className = 'badge bg-warning text-dark ms-auto';
    document.getElementById('matches').style.opacity = '0.5';
  }
};

const _fetchLiveData = async () => {
  try {
    const [{active, fixtures: trackedIds}, liveData] = await Promise.all([
      fetch(`${PROXY}/api/poll/active`, {headers: _h}).then(r => r.json()),
      fetch(`${PROXY}/api/live`, {headers: _h}).then(r => r.json()),
    ]);
    setPollStatus(active, trackedIds);
    renderFixtures(liveData);
    loadingEl.classList.add('d-none');
  } catch {
    badgeEl.textContent = T.liveError;
    badgeEl.className = 'badge bg-danger ms-auto';
  }
};

try {
  const [groups, results] = await Promise.all([
    fetch(`${PROXY}/api/standings`, {headers: _h}).then(r => r.json()),
    fetch(`${PROXY}/api/group-results`, {headers: _h}).then(r => r.json()),
  ]);
  baseStandings = groups;
  groupResults = results;
} catch (e) { console.warn('Failed to fetch standings/results:', e); }

await _fetchLiveData();

authBar.addEventListener('auth-bar-online', () => _fetchLiveData());

sock.on('poll_status', ({active, fixtures: trackedIds}) => {
  setPollStatus(active, trackedIds ?? []);
});

sock.on('live_update', (fixtures) => {
  renderFixtures(fixtures);
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
