<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mondial 2026 · Live Game</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css">
<style>
body { background: #f5f2ec; }
.player-num { width: 2em; text-align: right; font-weight: 700; }
.player-pos { width: 1.5em; text-align: center; color: #888; }
.team-flag { width: 32px; height: 24px; border-radius: 3px; }
.lineup-card { min-width: 280px; }
.sub { color: #888; }
.evt { font-size: 12px; padding: 3px 0; border-bottom: 1px solid #eee; }
.evt:last-child { border-bottom: none; }
.evt-min { width: 3em; text-align: right; font-weight: 700; color: #888; }
.evt-icon { width: 1.5em; text-align: center; }
.evt-goal { color: #198754; }
.evt-card-yellow { color: #ffc107; }
.evt-card-red { color: #dc3545; }
.evt-subst { color: #0d6efd; }
.evt-var { color: #6f42c1; }
.stat-row { font-size: 12px; padding: 2px 0; }
.stat-label { text-align: center; color: #888; flex: 0 0 auto; width: 110px; }
.stat-val { font-weight: 600; min-width: 2.5em; }
.stat-bar-wrap { flex: 1; height: 6px; background: #eee; border-radius: 3px; }
.stat-bar { height: 100%; border-radius: 3px; }
.stat-bar-home { background: #0d6efd; }
.stat-bar-away { background: #dc3545; }
.fix-pill { cursor: pointer; border: 1px solid #dee2e6; border-radius: 20px; padding: 4px 12px; font-size: 12px; background: #fff; transition: all .15s; white-space: nowrap; }
.fix-pill:hover { border-color: #999; }
.fix-pill.active { background: #1C274C; color: #fff; border-color: #1C274C; }
</style>
</head>
<body>
<script type="module" src="js/auth-bar.js"></script>
<mundial-auth-bar></mundial-auth-bar>

<div id="main-content" class="container-xxl py-4">
  <div class="d-flex align-items-start gap-2 mb-3">
    <a href="https://dashboard.api-football.com/" target="_blank" rel="noopener" class="btn btn-light btn-sm text-muted text-decoration-none fs-6 lh-1 px-2 py-1">API</a>
    <div>
      <h1 id="live-title" class="fs-5 fw-bold mb-0">Live Game</h1>
      <p id="live-subtitle" class="text-muted small mb-0">World Cup 2026</p>
    </div>
    <span id="ws-status" class="badge bg-secondary ms-auto">connecting…</span>
  </div>

  <div id="fix-selector" class="d-flex gap-2 mb-3 d-none"></div>
  <div id="no-match" class="alert alert-secondary d-none">No World Cup match currently live.</div>
  <div id="matches"></div>
  <div id="loading" class="text-muted small">Connecting to backend…</div>
</div>

<script type="module">
import { T } from './js/i18n.js';

document.getElementById('live-title').textContent = T.liveTitle;
document.getElementById('live-subtitle').textContent = T.liveSubtitle;
document.getElementById('ws-status').textContent = T.liveBadgeConnecting;
document.getElementById('no-match').textContent = T.liveNoMatch;
document.getElementById('loading').textContent = T.liveConnecting;

let PROXY;
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  PROXY = 'http://localhost:5002';
} else {
  try {
    const cfg = await fetch('./backend_config.json').then(r => r.json());
    PROXY = cfg.backend_url;
  } catch {
    document.getElementById('loading').textContent = T.liveNotRunning;
    throw new Error('no backend');
  }
}

const _backendCheck = () => fetch(PROXY + '/api/auth/me', {
  credentials: 'include',
  signal: AbortSignal.timeout(3000),
  headers: {'ngrok-skip-browser-warning': '1'}
});

try {
  await _backendCheck();
} catch {
  const loadingEl = document.getElementById('loading');
  const badgeEl = document.getElementById('ws-status');
  badgeEl.textContent = T.liveNoBackend;
  badgeEl.className = 'badge bg-warning text-dark ms-auto';
  await new Promise(resolve => {
    const retry = async () => {
      let sec = 30;
      loadingEl.innerHTML = T.liveNotRunning + ' ' + T.liveRetrying(sec);
      await new Promise(r => {
        const id = setInterval(() => {
          sec--;
          loadingEl.innerHTML = T.liveNotRunning + ' ' + T.liveRetrying(sec);
          if (sec <= 0) { clearInterval(id); r(); }
        }, 1000);
      });
      loadingEl.textContent = T.liveConnecting;
      try {
        await _backendCheck();
        resolve();
      } catch {
        retry();
      }
    };
    retry();
  });
}

// Build name → birth_country lookup from our data with fuzzy matching
const mapData = await fetch('./wc2026_map_data.json').then(r => r.json());
const _norm = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
const _exactBC = {};    // exact name → birth_country
const _normBC = {};     // normalized name → birth_country
const _lastNameBC = {}; // normalized last name → birth_country (only if unique)
const _lastNameConflict = new Set();

for (const rec of mapData.data) {
  for (const p of rec.players) {
    _exactBC[p.name] = rec.country;
    _normBC[_norm(p.name)] = rec.country;
    const last = _norm(p.name.split(' ').pop());
    if (_lastNameBC[last] && _lastNameBC[last] !== rec.country) _lastNameConflict.add(last);
    _lastNameBC[last] = rec.country;
  }
}

const getBirthCountry = (apiName) => {
  if (_exactBC[apiName]) return _exactBC[apiName];
  const n = _norm(apiName);
  if (_normBC[n]) return _normBC[n];
  // Try last name only (API often uses "K. Mbappé" or just "Mbappé")
  const last = _norm(apiName.split(' ').pop());
  if (_lastNameBC[last] && !_lastNameConflict.has(last)) return _lastNameBC[last];
  // Try if any normalized key contains or is contained by the API name
  for (const [key, country] of Object.entries(_normBC)) {
    if (key.includes(n) || n.includes(key)) return country;
  }
  return null;
};

const flagCode = name => {
  const MAP = {
    'Germany':'de','Ivory Coast':'ci','France':'fr','Brazil':'br','Argentina':'ar',
    'England':'gb-eng','Scotland':'gb-sct','Wales':'gb-wls','Northern Ireland':'gb-nir',
    'Spain':'es','Portugal':'pt','Netherlands':'nl','Belgium':'be','Italy':'it',
    'Croatia':'hr','Denmark':'dk','Switzerland':'ch','Uruguay':'uy','Colombia':'co',
    'Mexico':'mx','United States':'us','USA':'us','Canada':'ca','Japan':'jp',
    'South Korea':'kr','Australia':'au','Saudi Arabia':'sa','Iran':'ir','Qatar':'qa',
    'Morocco':'ma','Senegal':'sn','Ghana':'gh','Cameroon':'cm','Nigeria':'ng',
    'Tunisia':'tn','Egypt':'eg','Algeria':'dz','Ecuador':'ec','Paraguay':'py',
    'Chile':'cl','Peru':'pe','Bolivia':'bo','Venezuela':'ve','Costa Rica':'cr',
    'Honduras':'hn','Panama':'pa','Jamaica':'jm','Haiti':'ht','Trinidad And Tobago':'tt',
    'Serbia':'rs','Poland':'pl','Austria':'at','Czech Republic':'cz','Romania':'ro',
    'Ukraine':'ua','Turkey':'tr','Greece':'gr','Hungary':'hu','Norway':'no',
    'Sweden':'se','Finland':'fi','Iceland':'is','Ireland':'ie','Albania':'al',
    'Bosnia and Herzegovina':'ba','Montenegro':'me','North Macedonia':'mk',
    'Slovenia':'si','Slovakia':'sk','Georgia':'ge','New Zealand':'nz',
    'China':'cn','Indonesia':'id','India':'in','Iraq':'iq','Jordan':'jo',
    'Uzbekistan':'uz','Palestine':'ps','Syria':'sy','Bahrain':'bh','Oman':'om',
    'Kuwait':'kw','Cape Verde':'cv','DR Congo':'cd','Mali':'ml',
    'Burkina Faso':'bf','Guinea':'gn','Mozambique':'mz','Tanzania':'tz',
    'South Africa':'za','Kenya':'ke','Uganda':'ug','Zimbabwe':'zw',
    'Zambia':'zm','Angola':'ao','Benin':'bj','Togo':'tg','Niger':'ne',
    'Congo':'cg','Gabon':'ga','Comoros':'km','Madagascar':'mg',
    'Mauritania':'mr','Namibia':'na','Rwanda':'rw','Sierra Leone':'sl',
    'Korea Republic':'kr','Türkiye':'tr','Czechia':'cz',
  };
  return MAP[name] ?? name.toLowerCase().slice(0, 2);
};

const posLabel = pos => ({G:'GK', D:'DF', M:'MF', F:'FW'}[pos] ?? pos ?? '');

const renderTeam = (lineup, side) => {
  const team = lineup.team;
  const formation = lineup.formation ?? '?';
  const iso = flagCode(team.name);

  const playerRow = (p, isSub) => {
    const born = getBirthCountry(p.name);
    const isForeign = born && born !== team.name;
    const bornTag = isForeign ? ` <span class="fi fi-${flagCode(born)}" style="font-size:10px" title="Born in ${born}"></span>` : '';
    return `
    <tr class="${isSub ? 'sub' : ''}">
      <td class="player-num">${p.number}</td>
      <td class="player-pos"><small>${posLabel(p.pos)}</small></td>
      <td>${p.name}${bornTag}</td>
    </tr>`;
  };

  return `
    <div class="lineup-card card flex-fill">
      <div class="card-header d-flex align-items-center gap-2 ${side === 'home' ? '' : 'flex-row-reverse'}">
        <span class="fi fi-${iso} team-flag"></span>
        <span class="fw-bold">${team.name}</span>
        <span class="text-muted ms-auto">${formation}</span>
      </div>
      <div class="card-body p-0">
        ${lineup.coach ? (() => {
          const c = lineup.coach;
          const born = getBirthCountry(c.name);
          const isForeign = born && born !== team.name;
          const bornTag = isForeign ? ` <span class="fi fi-${flagCode(born)}" style="font-size:10px" title="Born in ${born}"></span>` : '';
          return `<div class="d-flex align-items-center gap-2 px-3 py-2 border-bottom" style="background:#fafaf7">
            <img src="${c.photo}" class="rounded-circle" width="28" height="28" referrerpolicy="no-referrer" alt="">
            <span class="small">${c.name}${bornTag}</span>
            <span class="text-muted small ms-auto">Coach</span>
          </div>`;
        })() : ''}
        <table class="table table-sm mb-0">
          <tbody>
            <tr><td colspan="3" class="fw-bold small text-muted px-3 pt-2">Starting XI</td></tr>
            ${lineup.startXI.map(p => playerRow(p.player, false)).join('')}
            <tr><td colspan="3" class="fw-bold small text-muted px-3 pt-2">Substitutes</td></tr>
            ${(lineup.substitutes ?? []).map(p => playerRow(p.player, true)).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
};

const renderEvent = (evt) => {
  const min = evt.time.elapsed + (evt.time.extra ? '+' + evt.time.extra : '');
  const player = evt.player?.name ?? '';
  const assist = evt.assist?.name;
  let icon = '', cls = '', detail = '';

  if (evt.type === 'Goal') {
    icon = '⚽'; cls = 'evt-goal';
    detail = player + (assist ? ` (${assist})` : '') + (evt.detail !== 'Normal Goal' ? ` · ${evt.detail}` : '');
  } else if (evt.type === 'Card') {
    const isRed = evt.detail?.includes('Red');
    icon = isRed ? '🟥' : '🟨';
    cls = isRed ? 'evt-card-red' : 'evt-card-yellow';
    detail = player;
  } else if (evt.type === 'subst') {
    icon = '🔄'; cls = 'evt-subst';
    detail = `${assist ?? '?'} → ${player}`;
  } else if (evt.type === 'Var') {
    icon = '📺'; cls = 'evt-var';
    detail = `${player} · ${evt.detail ?? 'VAR'}`;
  } else {
    icon = '·';
    detail = `${player} · ${evt.detail ?? evt.type}`;
  }

  return `<div class="evt d-flex align-items-center gap-2 ${cls}">
    <span class="evt-min">${min}'</span>
    <span class="evt-icon">${icon}</span>
    <span class="fi fi-${flagCode(evt.team?.name ?? '')}" style="font-size:10px"></span>
    <span>${detail}</span>
  </div>`;
};

const renderStats = (statistics) => {
  if (!statistics || statistics.length < 2) return '';
  const homeStat = {};
  const awayStat = {};
  for (const s of statistics[0].statistics) homeStat[s.type] = s.value;
  for (const s of statistics[1].statistics) awayStat[s.type] = s.value;
  const types = statistics[0].statistics.map(s => s.type);

  return types.map(type => {
    const hRaw = homeStat[type];
    const aRaw = awayStat[type];
    const hVal = parseFloat(hRaw) || 0;
    const aVal = parseFloat(aRaw) || 0;
    const total = hVal + aVal || 1;
    const hPct = (hVal / total * 100).toFixed(0);
    const aPct = (aVal / total * 100).toFixed(0);
    return `<div class="stat-row d-flex align-items-center gap-2">
      <span class="stat-val text-end">${hRaw ?? 0}</span>
      <div class="stat-bar-wrap"><div class="stat-bar stat-bar-home" style="width:${hPct}%;margin-left:auto"></div></div>
      <span class="stat-label">${type}</span>
      <div class="stat-bar-wrap"><div class="stat-bar stat-bar-away" style="width:${aPct}%"></div></div>
      <span class="stat-val">${aRaw ?? 0}</span>
    </div>`;
  }).join('');
};

const renderMatch = (fix, lineups) => {
  const home = fix.teams.home;
  const away = fix.teams.away;
  const score = fix.goals;
  const status = fix.fixture.status;
  const venue = fix.fixture.venue;
  const events = fix.events ?? [];
  const statistics = fix.statistics ?? [];

  const homeISO = flagCode(home.name);
  const awayISO = flagCode(away.name);

  let html = `
    <div class="mb-4">
      <div class="card">
        <div class="card-header">
          <div class="d-flex justify-content-center align-items-center gap-3 py-2">
            <span class="fi fi-${homeISO} team-flag"></span>
            <span class="fw-bold">${home.name}</span>
            <span class="fs-3 fw-bold px-2">${score.home ?? '–'} — ${score.away ?? '–'}</span>
            <span class="fw-bold">${away.name}</span>
            <span class="fi fi-${awayISO} team-flag"></span>
          </div>
          <div class="text-center text-muted small">
            ${status.long}${status.elapsed && !['HT','FT','AET','PEN','BT','ET'].includes(status.short) ? ' · ' + status.elapsed + (status.extra ? '+' + status.extra : '') + '\'' : ''}
            ${venue?.city ? ' · ' + venue.city : ''}
          </div>
        </div>
        ${events.length > 0 ? `<div class="card-body py-2 px-3">${events.map(renderEvent).join('')}</div>` : ''}
      </div>`;

  const statsHtml = renderStats(statistics);
  if (statsHtml) {
    html += `<div class="card mt-2"><div class="card-body py-2 px-3">${statsHtml}</div></div>`;
  }

  if (lineups.length === 2) {
    html += `
      <div class="d-flex gap-3 mt-2 flex-wrap flex-md-nowrap">
        ${renderTeam(lineups[0], 'home')}
        ${renderTeam(lineups[1], 'away')}
      </div>`;
  } else {
    html += `<p class="text-muted small mt-2">Lineups not yet available</p>`;
  }

  html += `</div>`;
  return html;
};

const lineupsCache = {};
const _h = {'ngrok-skip-browser-warning': '1'};

const fetchLineups = async (fixtureId) => {
  if (lineupsCache[fixtureId]) return lineupsCache[fixtureId];
  try {
    const data = await fetch(`${PROXY}/api/lineups/${fixtureId}`, {headers: _h}).then(r => r.json());
    if (data.length > 0) lineupsCache[fixtureId] = data;
    return data;
  } catch { return []; }
};

let allFixtures = [];
let selectedFixId = null;

const renderSelectedFixture = async () => {
  const matchesEl = document.getElementById('matches');
  const fix = allFixtures.find(f => f.fixture.id === selectedFixId);
  if (!fix) { matchesEl.innerHTML = ''; return; }
  const lineups = await fetchLineups(fix.fixture.id);
  matchesEl.innerHTML = renderMatch(fix, lineups);
};

const renderSelector = () => {
  const sel = document.getElementById('fix-selector');
  if (allFixtures.length <= 1) {
    sel.classList.add('d-none');
    return;
  }
  sel.classList.remove('d-none');
  sel.innerHTML = allFixtures.map(fix => {
    const h = fix.teams.home;
    const a = fix.teams.away;
    const s = fix.fixture.status;
    const active = fix.fixture.id === selectedFixId ? 'active' : '';
    const elapsed = s.elapsed && !['HT','FT','AET','PEN','BT','ET'].includes(s.short) ? ` · ${s.elapsed}${s.extra ? '+' + s.extra : ''}'` : '';
    return `<span class="fix-pill ${active}" data-fid="${fix.fixture.id}">
      <span class="fi fi-${flagCode(h.name)}" style="font-size:11px"></span>
      ${fix.goals.home ?? '–'}–${fix.goals.away ?? '–'}
      <span class="fi fi-${flagCode(a.name)}" style="font-size:11px"></span>${elapsed}
    </span>`;
  }).join('');
  sel.querySelectorAll('.fix-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      selectedFixId = parseInt(pill.dataset.fid);
      renderSelector();
      renderSelectedFixture();
    });
  });
};

const renderFixtures = async (fixtures) => {
  document.getElementById('loading').classList.add('d-none');
  allFixtures = fixtures;

  if (fixtures.length === 0) {
    document.getElementById('no-match').classList.remove('d-none');
    document.getElementById('fix-selector').classList.add('d-none');
    document.getElementById('matches').innerHTML = '';
    selectedFixId = null;
    return;
  }

  document.getElementById('no-match').classList.add('d-none');

  if (!selectedFixId || !fixtures.find(f => f.fixture.id === selectedFixId)) {
    selectedFixId = fixtures[0].fixture.id;
  }

  renderSelector();
  await renderSelectedFixture();
};

const badge = document.getElementById('ws-status');
const sioScript = document.createElement('script');
sioScript.src = 'https://cdn.jsdelivr.net/npm/socket.io-client@4/dist/socket.io.min.js';
sioScript.onload = () => {
  const sock = io(PROXY, {
    transports: ['websocket'],
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 30000,
  });

  const setPollStatus = (active, fixtures = []) => {
    if (active) {
      badge.textContent = fixtures.length > 0 ? `live · ${fixtures.length} match${fixtures.length > 1 ? 'es' : ''}` : 'live';
      badge.className = 'badge bg-success ms-auto';
      document.getElementById('matches').style.opacity = '';
    } else {
      badge.textContent = 'last known';
      badge.className = 'badge bg-warning text-dark ms-auto';
      document.getElementById('matches').style.opacity = '0.5';
    }
  };

  sock.on('connect', async () => {
    console.log('[live] WebSocket connected, id:', sock.id);
    try {
      const [{active, fixtures: trackedIds}, liveData] = await Promise.all([
        fetch(`${PROXY}/api/poll/active`, {headers: _h}).then(r => r.json()),
        fetch(`${PROXY}/api/live`, {headers: _h}).then(r => r.json()),
      ]);
      setPollStatus(active, trackedIds);
      renderFixtures(liveData);
    } catch {
      badge.textContent = 'error';
      badge.className = 'badge bg-danger ms-auto';
    }
  });

  sock.on('disconnect', (reason) => {
    console.warn('[live] WebSocket disconnected:', reason);
    badge.textContent = 'disconnected';
    badge.className = 'badge bg-danger ms-auto';
  });

  sock.on('reconnect_attempt', (attempt) => {
    console.log('[live] WebSocket reconnection attempt', attempt);
    badge.textContent = `reconnecting… (${attempt})`;
    badge.className = 'badge bg-warning text-dark ms-auto';
  });

  sock.on('reconnect', (attempt) => {
    console.log('[live] WebSocket reconnected after', attempt, 'attempt(s)');
  });

  sock.on('connect_error', (err) => {
    console.warn('[live] WebSocket connect error:', err.message);
  });

  sock.on('poll_status', ({active, fixtures: trackedIds}) => {
    setPollStatus(active, trackedIds ?? []);
  });

  sock.on('live_update', (fixtures) => {
    renderFixtures(fixtures);
  });
};
document.head.appendChild(sioScript);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
