<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mondial 2026 · Live Game</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7/css/flag-icons.min.css">
<style>
body { background: #f5f2ec; }
.player-num { width: 2em; text-align: right; font-weight: 700; }
.player-pos { width: 1.5em; text-align: center; color: #888; }
.team-flag { width: 32px; height: 24px; border-radius: 3px; }
.lineup-card { min-width: 280px; }
.sub { color: #888; }
</style>
</head>
<body>

<div class="container-xxl py-4">
  <div class="d-flex align-items-start gap-2 mb-3">
    <a href="/" class="btn btn-light btn-sm text-muted text-decoration-none fs-5 lh-1 px-2 py-0">‹</a>
    <div>
      <h1 class="fs-5 fw-bold mb-0">Live Game</h1>
      <p class="text-muted small mb-0">World Cup 2026</p>
    </div>
  </div>

  <div id="no-match" class="alert alert-secondary d-none">No World Cup match currently live.</div>
  <div id="matches"></div>
  <div id="loading" class="text-muted small">Loading live fixtures…</div>
</div>

<script type="module">

const PROXY = 'http://localhost:5002';

const flagCode = name => {
  const MAP = {
    'Germany':'de','Ivory Coast':'ci','France':'fr','Brazil':'br','Argentina':'ar',
    'England':'gb-eng','Scotland':'gb-sct','Wales':'gb-wls','Northern Ireland':'gb-nir',
    'Spain':'es','Portugal':'pt','Netherlands':'nl','Belgium':'be','Italy':'it',
    'Croatia':'hr','Denmark':'dk','Switzerland':'ch','Uruguay':'uy','Colombia':'co',
    'Mexico':'mx','United States':'us','USA':'us','Canada':'ca','Japan':'jp',
    'South Korea':'kr','Australia':'au','Saudi Arabia':'sa','Iran':'ir','Qatar':'qa',
    'Morocco':'ma','Senegal':'sn','Ghana':'gh','Cameroon':'cm','Nigeria':'ng',
    'Tunisia':'tn','Egypt':'eg','Algeria':'dz','Ecuador':'ec','Paraguay':'py',
    'Chile':'cl','Peru':'pe','Bolivia':'bo','Venezuela':'ve','Costa Rica':'cr',
    'Honduras':'hn','Panama':'pa','Jamaica':'jm','Haiti':'ht','Trinidad And Tobago':'tt',
    'Serbia':'rs','Poland':'pl','Austria':'at','Czech Republic':'cz','Romania':'ro',
    'Ukraine':'ua','Turkey':'tr','Greece':'gr','Hungary':'hu','Norway':'no',
    'Sweden':'se','Finland':'fi','Iceland':'is','Ireland':'ie','Albania':'al',
    'Bosnia and Herzegovina':'ba','Montenegro':'me','North Macedonia':'mk',
    'Slovenia':'si','Slovakia':'sk','Georgia':'ge','New Zealand':'nz',
    'China':'cn','Indonesia':'id','India':'in','Iraq':'iq','Jordan':'jo',
    'Uzbekistan':'uz','Palestine':'ps','Syria':'sy','Bahrain':'bh','Oman':'om',
    'Kuwait':'kw','Cape Verde':'cv','DR Congo':'cd','Mali':'ml',
    'Burkina Faso':'bf','Guinea':'gn','Mozambique':'mz','Tanzania':'tz',
    'South Africa':'za','Kenya':'ke','Uganda':'ug','Zimbabwe':'zw',
    'Zambia':'zm','Angola':'ao','Benin':'bj','Togo':'tg','Niger':'ne',
    'Congo':'cg','Gabon':'ga','Comoros':'km','Madagascar':'mg',
    'Mauritania':'mr','Namibia':'na','Rwanda':'rw','Sierra Leone':'sl',
    'Korea Republic':'kr','Türkiye':'tr','Czechia':'cz',
  };
  return MAP[name] ?? name.toLowerCase().slice(0, 2);
};

const posLabel = pos => ({G:'GK', D:'DF', M:'MF', F:'FW'}[pos] ?? pos ?? '');

const renderTeam = (lineup, side) => {
  const team = lineup.team;
  const formation = lineup.formation ?? '?';
  const iso = flagCode(team.name);

  const playerRow = (p, isSub) => `
    <tr class="${isSub ? 'sub' : ''}">
      <td class="player-num">${p.number}</td>
      <td class="player-pos"><small>${posLabel(p.pos)}</small></td>
      <td>${p.name}</td>
    </tr>`;

  return `
    <div class="lineup-card card flex-fill">
      <div class="card-header d-flex align-items-center gap-2 ${side === 'home' ? '' : 'flex-row-reverse'}">
        <span class="fi fi-${iso} team-flag"></span>
        <span class="fw-bold">${team.name}</span>
        <span class="text-muted ms-auto">${formation}</span>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm mb-0">
          <tbody>
            <tr><td colspan="3" class="fw-bold small text-muted px-3 pt-2">Starting XI</td></tr>
            ${lineup.startXI.map(p => playerRow(p.player, false)).join('')}
            <tr><td colspan="3" class="fw-bold small text-muted px-3 pt-2">Substitutes</td></tr>
            ${(lineup.substitutes ?? []).map(p => playerRow(p.player, true)).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
};

const renderMatch = (fix, lineups) => {
  const home = fix.teams.home;
  const away = fix.teams.away;
  const score = fix.goals;
  const status = fix.fixture.status;
  const venue = fix.fixture.venue;

  const homeISO = flagCode(home.name);
  const awayISO = flagCode(away.name);

  let html = `
    <div class="mb-4">
      <div class="card">
        <div class="card-header">
          <div class="d-flex justify-content-center align-items-center gap-3 py-2">
            <span class="fi fi-${homeISO} team-flag"></span>
            <span class="fw-bold">${home.name}</span>
            <span class="fs-3 fw-bold px-2">${score.home ?? '–'} — ${score.away ?? '–'}</span>
            <span class="fw-bold">${away.name}</span>
            <span class="fi fi-${awayISO} team-flag"></span>
          </div>
          <div class="text-center text-muted small">
            ${status.long}${status.elapsed ? ' · ' + status.elapsed + '\'' : ''}
            ${venue?.name ? ' · ' + venue.name : ''}
          </div>
        </div>
      </div>`;

  if (lineups.length === 2) {
    html += `
      <div class="d-flex gap-3 mt-2 flex-wrap flex-md-nowrap">
        ${renderTeam(lineups[0], 'home')}
        ${renderTeam(lineups[1], 'away')}
      </div>`;
  } else {
    html += `<p class="text-muted small mt-2">Lineups not yet available</p>`;
  }

  html += `</div>`;
  return html;
};

const refresh = async () => {
  try {
    const fixtures = await fetch(`${PROXY}/api/live`).then(r => r.json());
    document.getElementById('loading').classList.add('d-none');

    if (fixtures.length === 0) {
      document.getElementById('no-match').classList.remove('d-none');
      document.getElementById('matches').innerHTML = '';
      return;
    }

    document.getElementById('no-match').classList.add('d-none');
    let html = '';

    for (const fix of fixtures) {
      const fixId = fix.fixture.id;
      let lineups = [];
      try {
        lineups = await fetch(`${PROXY}/api/lineups/${fixId}`).then(r => r.json());
      } catch {}
      html += renderMatch(fix, lineups);
    }

    document.getElementById('matches').innerHTML = html;
  } catch (err) {
    document.getElementById('loading').textContent = `Error: ${err.message}. Is the proxy running on port 5000?`;
    document.getElementById('loading').classList.remove('d-none');
  }
};

refresh();
setInterval(refresh, 60_000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
