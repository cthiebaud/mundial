<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Export chain · Mondial 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f2ec; display: flex; justify-content: center; padding: 24px 16px 40px; }
  #container { max-width: 100%; }
</style>
</head>
<body>
<div id="container"></div>
<script>
const CDN = code => `https://cdn.jsdelivr.net/npm/circle-flags@2/flags/${code}.svg`;
const NS  = 'http://www.w3.org/2000/svg';

function svg_el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, String(v));
  return e;
}
function svg_text(tag, attrs, text) {
  const e = svg_el(tag, attrs);
  e.textContent = text;
  return e;
}

function render(chain) {
  const NODE_H = 100;   // px between node centres
  const TOP    = 72;    // title area height
  const FR     = 22;    // flag radius (flag = 44×44)
  const SX     = 40;    // spine x
  const TX     = 72;    // text x (right of flag)

  const hasLoop = chain.links.some(l => l.loop_back !== undefined);
  const W  = hasLoop ? 380 : 340;
  const LX = W - 18;   // loop curve right extent

  const n   = chain.nodes.length;
  const cy  = i => TOP + 30 + i * NODE_H;
  const H   = cy(n - 1) + FR + 60;

  const root = svg_el('svg', {
    width: W, height: H, viewBox: `0 0 ${W} ${H}`,
    style: `font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:100%`
  });

  // Card
  root.appendChild(svg_el('rect', {width: W, height: H, rx: 14, fill: '#fff', opacity: '.75'}));
  root.appendChild(svg_el('rect', {width: W, height: H, rx: 14, fill: 'none', stroke: '#e8e4de', 'stroke-width': 1}));

  // Title
  root.appendChild(svg_text('text', {x: W/2, y: 34, 'text-anchor': 'middle', 'font-size': 14, 'font-weight': 600, fill: '#1a1a18', 'letter-spacing': '-.2'}, chain.title));
  root.appendChild(svg_text('text', {x: W/2, y: 51, 'text-anchor': 'middle', 'font-size': 11, fill: '#aaa'}, chain.subtitle));

  // Defs: two markers — downward arrow + loop arrow (same shape, auto-orient handles direction)
  const defs = svg_el('defs');
  for (const id of ['arr', 'arr-loop']) {
    const m = svg_el('marker', {id, viewBox: '0 -4 8 8', refX: 7, refY: 0, markerWidth: 4, markerHeight: 4, orient: 'auto'});
    m.appendChild(svg_el('path', {d: 'M0,-4L8,0L0,4Z', fill: '#9b59b6'}));
    defs.appendChild(m);
  }
  root.appendChild(defs);

  // Spine (dashed vertical line behind everything)
  root.appendChild(svg_el('line', {
    x1: SX, y1: cy(0) - FR, x2: SX, y2: cy(n - 1) + FR,
    stroke: '#e8e4de', 'stroke-width': 1.5, 'stroke-dasharray': '3,3'
  }));

  // Links
  chain.links.forEach((link, i) => {
    if (link.loop_back !== undefined) {
      // ── Loop arrow (dashed curve on the right, back up to loop_back node) ──
      const fromY  = cy(n - 1) + FR + 2;
      const toY    = cy(link.loop_back) - FR - 2;
      const midY   = (fromY + toY) / 2;

      root.appendChild(svg_el('path', {
        d: `M${SX},${fromY} C${LX},${fromY} ${LX},${toY} ${SX},${toY}`,
        fill: 'none', stroke: '#9b59b6', 'stroke-width': 1.4,
        'stroke-dasharray': '5,3', 'marker-end': 'url(#arr-loop)'
      }));

      // Loop label (right-aligned near curve apex)
      root.appendChild(svg_text('text', {x: LX - 6, y: midY - 7, 'text-anchor': 'end', 'font-size': 11, 'font-style': 'italic', fill: '#6c3483'}, link.player));
      root.appendChild(svg_text('text', {x: LX - 6, y: midY + 6, 'text-anchor': 'end', 'font-size': 9.5, fill: '#aaa'}, link.role === 'coach' ? `born ${link.city} · coach` : `born ${link.city} · ${link.caps} caps`));

      // Small ↺ tag on the target node to indicate loop arrival
      root.appendChild(svg_text('text', {x: SX - 6, y: cy(link.loop_back) - FR - 6, 'text-anchor': 'middle', 'font-size': 9, fill: '#9b59b6'}, '↺'));

    } else {
      // ── Normal downward arrow ──
      const fromY = cy(i)     + FR + 2;
      const toY   = cy(i + 1) - FR - 2;
      const midY  = (fromY + toY) / 2;

      root.appendChild(svg_el('line', {x1: SX, y1: fromY, x2: SX, y2: toY, stroke: '#9b59b6', 'stroke-width': 1.5, 'marker-end': 'url(#arr)'}));
      root.appendChild(svg_el('line', {x1: SX, y1: midY, x2: SX + 12, y2: midY, stroke: '#9b59b6', 'stroke-width': 1}));
      root.appendChild(svg_text('text', {x: TX, y: midY - 4, 'font-size': 11, 'font-style': 'italic', fill: '#6c3483'}, link.player));
      root.appendChild(svg_text('text', {x: TX, y: midY + 9, 'font-size': 9.5, fill: '#aaa'}, link.role === 'coach' ? `born ${link.city} · coach` : `born ${link.city} · ${link.caps} caps`);
    }
  });

  // Nodes: flag + country name [+ optional note]
  chain.nodes.forEach((node, i) => {
    root.appendChild(svg_el('image', {href: CDN(node.code), x: SX - FR, y: cy(i) - FR, width: FR*2, height: FR*2}));
    const nameY = node.note ? cy(i) - 4 : cy(i) + 5;
    root.appendChild(svg_text('text', {x: TX, y: nameY, 'font-size': 13, 'font-weight': 500, fill: '#1a1a18'}, node.country));
    if (node.note) root.appendChild(svg_text('text', {x: TX, y: cy(i) + 11, 'font-size': 10, fill: '#bbb'}, node.note));
  });

  // Footer
  if (chain.source) root.appendChild(svg_text('text', {x: W/2, y: H - 16, 'text-anchor': 'middle', 'font-size': 9, fill: '#ccc'}, chain.source));

  document.getElementById('container').appendChild(root);
}

// Load data file from ?data= param, default to main chain
const dataFile = new URLSearchParams(location.search).get('data') || 'wc2026_chain_main.json';
fetch(dataFile)
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
  .then(render)
  .catch(e => { document.getElementById('container').textContent = 'Could not load ' + dataFile + ': ' + e.message; });
</script>
</body>
</html>
