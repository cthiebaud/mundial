<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elo Ranking · Mondial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/wc2026_map.css">
<link rel="stylesheet" href="css/taxonomy.css">
</head>
<body>
<script src="js/auth-bar.js"></script>
<mundial-auth-bar></mundial-auth-bar>
<div id="main-content" class="container py-4 pb-5 taxonomy">
  <header class="mb-4">
    <h1 class="fs-5 fw-semibold mb-1">World Football Elo Rankings</h1>
    <p class="sub mb-0" id="elo-meta"></p>
  </header>
  <elo-ranking id="list"></elo-ranking>
</div>
<script type="module">
import './js/wc2026_elo_ranking.js';
import { QUALIFIED_BY_NAME, buildEloItems } from './js/qualified.js';
import { LOCALE, countryName } from './js/i18n.js';

const [eloData, mapData] = await Promise.all([
  fetch('./wc2026_elo_rank.json').then(r => r.json()),
  fetch('./wc2026_map_data.json').then(r => r.json()),
]);

const byId = Object.fromEntries((mapData.data ?? []).map(d => [d.id, d]));
const fifaMemberIds = new Set(eloData.rankings.filter(r => r.fifaMember).map(r => r.id));
const importByCountry = {};
for (const [name, players] of Object.entries(mapData.natives ?? {})) {
  const id = QUALIFIED_BY_NAME[name];
  if (id != null) importByCountry[id] = players;
}

const meta = document.getElementById('elo-meta');
const parts = [];
if (eloData.source) parts.push(`<a href="https://${eloData.source}/" target="_blank" rel="noopener" class="sub">${eloData.source}</a>`);
if (eloData.updated) {
  const d = new Date(eloData.updated + 'T00:00:00');
  const fmt = isNaN(d) ? eloData.updated : d.toLocaleDateString(LOCALE, { day: 'numeric', month: 'long', year: 'numeric' });
  parts.push(`updated ${fmt}`);
}
const items = buildEloItems({
  rankings: eloData.rankings,
  byId,
  importByCountry,
  fifaMemberIds,
  countryNameFn: countryName,
});

meta.innerHTML = `${items.length} countries · ${parts.join(' · ')}`;

const el = document.getElementById('list');
el.items = items;
el.show(items);
</script>
</body>
</html>
