<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide — Thiebaud's Mundial</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/taxonomy.css">
<style>
body {
  background: var(--fixed-element-bg, #faf9f6);
  padding: 3.5rem 1rem 5rem;
}

#guide-body {
  max-width: 720px;
  margin: 0 auto;
}

/* Guide content styles — :not(.taxonomy *) excludes taxonomy pill samples */

/* title */
#guide-body h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 2rem;
  padding-bottom: .5rem;
  border-bottom: 2px solid var(--border, #e4e0d8);
}

/* section heading */
#guide-body h2 {
  font-size: 1.05rem;
  font-weight: 600;
  margin-top: 2.5rem;
  margin-bottom: .6rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border, #e4e0d8);
}

/* subsection heading */
#guide-body h3 {
  font-size: .9rem;
  font-weight: 600;
  margin-top: 1.4rem;
  margin-bottom: .4rem;
  color: #555;
}

/* paragraph */
#guide-body p:not(.taxonomy *) {
  font-size: .925rem;
  line-height: 1.7;
  color: #333;
}

/* inline code — UI element names */
#guide-body code:not(.taxonomy *) {
  font-size: .82em;
  background: var(--bg-hover, #f0ede8);
  padding: .1em .38em;
  border-radius: 3px;
  color: var(--color-default, #171715);
}

/* image — max-width and display handled by Bootstrap .img-fluid .d-block */
#guide-body img:not(.taxonomy *) {
  border: 1px solid var(--border, #e4e0d8);
  border-radius: 6px;
  margin: .75rem auto .2rem;
}

/* didascalia — italic-only paragraph following an image or diagram */
#guide-body img + p > em:only-child,
#guide-body .mermaid + p > em:only-child,
#guide-body svg + p > em:only-child {
  display: block;
  font-size: .8rem;
  font-style: italic;
  color: var(--text-muted, #999);
  text-align: center;
  margin-top: .1rem;
  margin-bottom: 1.25rem;
}

/* callout — blockquote */
#guide-body blockquote {
  border-left: 3px solid var(--border-strong, #c8c4be);
  background: var(--bg-hover, #f0ede8);
  padding: .55rem 1rem;
  border-radius: 0 4px 4px 0;
  margin: 1.25rem 0;
}
#guide-body blockquote p {
  font-size: .875rem;
  margin: 0;
  color: #444;
}

/* tables — width, border-collapse, padding, text-align handled by Bootstrap .table .table-bordered */
#guide-body table {
  --bs-table-border-color: var(--border, #e4e0d8);
  font-size: .875rem;
  margin: 1rem 0;
}
#guide-body th {
  background: var(--bg-hover, #f0ede8);
  font-weight: 600;
}

/* mermaid diagram container */
.mermaid {
  margin: 1rem auto;
  text-align: center;
  overflow-x: auto;
}

#github-link {
  position: fixed;
  top: 38px;
  right: .75rem;
  z-index: 100;
  color: var(--text-muted, #999);
  opacity: .6;
  transition: opacity .2s;
  line-height: 0;
}
#github-link:hover { opacity: 1; }

#wip-banner { max-width: 720px; margin: 0 auto; margin-bottom: 2rem; text-align: center; }
#wip-box {
  display: inline-block; border-radius: 12px; padding: 1.5rem 2.5rem; background-color: #f0ede8;
  background-image:
    repeating-linear-gradient(90deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px),
    repeating-linear-gradient(0deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px),
    repeating-linear-gradient(90deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px),
    repeating-linear-gradient(0deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px);
  background-size: 100% 3px, 3px 100%, 100% 3px, 3px 100%;
  background-position: 0 0, 100% 0, 0 100%, 0 0;
  background-repeat: no-repeat;
  animation: wip-march .8s linear infinite;
}
@keyframes wip-march {
  to { background-position: 16px 0, 100% 16px, -16px 100%, 0 -16px; }
}
#wip-title { font-size: 2.5rem; font-weight: 700; color: #888; letter-spacing: .05em; line-height: 1.2; }
#wip-sub { font-size: .9rem; color: #999; margin-top: .4rem; }

#loading {
  color: var(--text-muted, #999);
  font-size: .875rem;
  text-align: center;
  margin-top: 5rem;
}
</style>
</head>
<body>
<mundial-auth-bar></mundial-auth-bar>
<script type="module" src="js/auth-bar.js"></script>
<a id="github-link" href="https://github.com/born-in-plays-for" target="_blank" rel="noopener" aria-label="GitHub">
  <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/></svg>
</a>
<div id="wip-banner">
  <div id="wip-box">
    <div id="wip-title">WORK IN PROGRESS</div>
    <div id="wip-sub">This guide is under construction</div>
  </div>
</div>
<div id="guide-body"><p id="loading">Loading…</p></div>
<script type="module">
import { marked }  from 'https://cdn.jsdelivr.net/npm/marked@14/+esm';
import { countryName } from './js/i18n.js';
import mermaid     from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontFamily: 'inherit' });

marked.use({
  hooks: {
    postprocess(html) {
      return html.replace(/<table>/g, '<table class="table table-bordered">');
    }
  },
  renderer: {
    image({ href, title, text }) {
      const src = href.startsWith('http') ? href : `guide/${href}`;
      return `<img class="img-fluid d-block" src="${src}" alt="${text}"${title ? ` title="${title}"` : ''}>`;
    },
    code({ text, lang }) {
      if (lang === 'mermaid') return `<pre class="mermaid">${text}</pre>`;
      return false;
    }
  }
});

const lang = new URLSearchParams(location.search).get('lang') ?? ['fr', 'de', 'it', 'es'].find(l => (navigator.languages?.[0] ?? '').startsWith(l)) ?? 'en';
const el   = document.getElementById('guide-body');

const urls = [`guide/built/${lang}-home.md`, 'guide/built/en-home.md'];
let md = null;
for (const url of urls) {
  const r = await fetch(url);
  if (r.ok) { md = await r.text(); break; }
}

if (!md) {
  el.innerHTML = '<p id="loading">Guide not built — run: <code>python3 guide/build_guide.py</code></p>';
} else {
  el.innerHTML = marked.parse(md);
  el.querySelectorAll('.elo-name[data-id]').forEach(span => {
    span.textContent = countryName(+span.dataset.id, span.textContent);
  });
  await mermaid.run();
}
</script>
</body>
</html>
