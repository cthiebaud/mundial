<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guide — Thiebaud's Mundial</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/wc2026_map.css">
<link rel="stylesheet" href="css/taxonomy.css">
<style>
body {
  background: var(--fixed-element-bg, #faf9f6);
  padding: 3.5rem 1rem 5rem;
}

#guide-body {
  max-width: 720px;
  margin: 0 auto;
}

/* Guide content styles — :not(.taxonomy *) excludes taxonomy pill samples */

/* title */
#guide-body h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 2rem;
  padding-bottom: .5rem;
  border-bottom: 2px solid var(--border, #e4e0d8);
}

/* section heading */
#guide-body h2 {
  font-size: 1.05rem;
  font-weight: 600;
  margin-top: 2.5rem;
  margin-bottom: .6rem;
  padding-bottom: .3rem;
  border-bottom: 1px solid var(--border, #e4e0d8);
}

/* subsection heading */
#guide-body h3 {
  font-size: .9rem;
  font-weight: 600;
  margin-top: 1.4rem;
  margin-bottom: .4rem;
  color: #555;
}

/* paragraph */
#guide-body p:not(.taxonomy *) {
  font-size: .925rem;
  line-height: 1.7;
  color: #333;
}

/* inline code — UI element names */
#guide-body code:not(.taxonomy *) {
  font-size: .82em;
  background: var(--bg-hover, #f0ede8);
  padding: .1em .38em;
  border-radius: 3px;
  color: var(--color-default, #171715);
}

/* image */
#guide-body img:not(.taxonomy *) {
  max-width: 100%;
  border: 1px solid var(--border, #e4e0d8);
  border-radius: 6px;
  display: block;
  margin: .75rem auto .2rem;
}

/* didascalia — italic-only paragraph following an image or diagram */
#guide-body img + p > em:only-child,
#guide-body .mermaid + p > em:only-child,
#guide-body svg + p > em:only-child {
  display: block;
  font-size: .8rem;
  font-style: italic;
  color: var(--text-muted, #999);
  text-align: center;
  margin-top: .1rem;
  margin-bottom: 1.25rem;
}

/* callout — blockquote */
#guide-body blockquote {
  border-left: 3px solid var(--border-strong, #c8c4be);
  background: var(--bg-hover, #f0ede8);
  padding: .55rem 1rem;
  border-radius: 0 4px 4px 0;
  margin: 1.25rem 0;
}
#guide-body blockquote p {
  font-size: .875rem;
  margin: 0;
  color: #444;
}

/* tables */
#guide-body table {
  font-size: .875rem;
  border-collapse: collapse;
  width: 100%;
  margin: 1rem 0;
}
#guide-body th,
#guide-body td {
  padding: .35rem .75rem;
  border: 1px solid var(--border, #e4e0d8);
  text-align: left;
}
#guide-body th {
  background: var(--bg-hover, #f0ede8);
  font-weight: 600;
}

/* mermaid diagram container */
.mermaid {
  margin: 1rem auto;
  text-align: center;
  overflow-x: auto;
}

#back-btn {
  position: fixed;
  top: .75rem;
  left: .75rem;
  z-index: 100;
  background: var(--fixed-element-bg, #faf9f6);
  border: 1px solid var(--border, #e4e0d8);
  border-radius: 4px;
  padding: .25rem .6rem;
  font-size: 1rem;
  color: var(--text-muted, #999);
  cursor: pointer;
  text-decoration: none;
  line-height: 1.4;
  transition: color .15s, border-color .15s;
}
#back-btn:hover { color: var(--color-default, #171715); border-color: var(--border-strong, #c8c4be); }

#wip-banner { max-width: 720px; margin: 0 auto; margin-bottom: 2rem; text-align: center; }
#wip-box {
  display: inline-block; border-radius: 12px; padding: 1.5rem 2.5rem; background-color: #f0ede8;
  background-image:
    repeating-linear-gradient(90deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px),
    repeating-linear-gradient(0deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px),
    repeating-linear-gradient(90deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px),
    repeating-linear-gradient(0deg, #c8c4be 0, #c8c4be 8px, transparent 8px, transparent 16px);
  background-size: 100% 3px, 3px 100%, 100% 3px, 3px 100%;
  background-position: 0 0, 100% 0, 0 100%, 0 0;
  background-repeat: no-repeat;
  animation: wip-march .8s linear infinite;
}
@keyframes wip-march {
  to { background-position: 16px 0, 100% 16px, -16px 100%, 0 -16px; }
}
#wip-title { font-size: 2.5rem; font-weight: 700; color: #888; letter-spacing: .05em; line-height: 1.2; }
#wip-sub { font-size: .9rem; color: #999; margin-top: .4rem; }

#loading {
  color: var(--text-muted, #999);
  font-size: .875rem;
  text-align: center;
  margin-top: 5rem;
}
</style>
</head>
<body>
<a id="back-btn" href="wc2026_map_exported.html" aria-label="Back to map">‹</a>
<div id="wip-banner">
  <div id="wip-box">
    <div id="wip-title">WORK IN PROGRESS</div>
    <div id="wip-sub">This guide is under construction</div>
  </div>
</div>
<div id="guide-body"><p id="loading">Loading…</p></div>
<script type="module">
import { marked }  from 'https://cdn.jsdelivr.net/npm/marked@14/+esm';
import { countryName } from './js/i18n.js';
import mermaid     from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({ startOnLoad: false, theme: 'neutral', fontFamily: 'inherit' });

marked.use({
  renderer: {
    image({ href, title, text }) {
      const src = href.startsWith('http') ? href : `guide/${href}`;
      return `<img src="${src}" alt="${text}"${title ? ` title="${title}"` : ''}>`;
    },
    code({ text, lang }) {
      if (lang === 'mermaid') return `<pre class="mermaid">${text}</pre>`;
      return false;
    }
  }
});

const lang = new URLSearchParams(location.search).get('lang') ?? ['fr', 'de', 'it', 'es'].find(l => (navigator.languages?.[0] ?? '').startsWith(l)) ?? 'en';
const el   = document.getElementById('guide-body');

// Try built/{lang}.md first, fall back to guide.md (English, unbuilt markers are invisible)
const urls = [`guide/built/${lang}.md`, 'guide/guide.md'];
let md = null;
for (const url of urls) {
  const r = await fetch(url);
  if (r.ok) { md = await r.text(); break; }
}

if (!md) {
  el.innerHTML = '<p id="loading">Guide not built — run: <code>python3 guide/build_guide.py</code></p>';
} else {
  el.innerHTML = marked.parse(md);
  el.querySelectorAll('.elo-name[data-id]').forEach(span => {
    span.textContent = countryName(+span.dataset.id, span.textContent);
  });
  await mermaid.run();
}
</script>
</body>
</html>
