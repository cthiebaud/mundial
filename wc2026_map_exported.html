<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiebaud's Mundial</title>
<link rel="icon" type="image/png" href="/realfavicongenerator/favicon-96x96.png?v=20260611" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/realfavicongenerator/favicon.svg?v=20260611" />
<link rel="shortcut icon" href="/realfavicongenerator/favicon.ico?v=20260611" />
<link rel="apple-touch-icon" sizes="180x180" href="/realfavicongenerator/apple-touch-icon.png?v=20260611" />
<meta name="apple-mobile-web-app-title" content="Thiebaud' Mundial" />
<link rel="manifest" href="/realfavicongenerator/site.webmanifest?v=20260611" />
<meta name="theme-color" content="#7b2d8b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description"         content="A D3.js choropleth map of the 2026 FIFA World Cup: players born in one country, playing for another.">
<meta property="og:title"       content="Thiebaud's Mundial">
<meta property="og:description" content="A D3.js choropleth map of the 2026 FIFA World Cup: players born in one country, playing for another.">
<meta property="og:image"            content="https://mundial.cthiebaud.com/wc2026_og_v3.png">
<meta property="og:image:url"        content="https://mundial.cthiebaud.com/wc2026_og_v3.png">
<meta property="og:image:secure_url" content="https://mundial.cthiebaud.com/wc2026_og_v3.png">
<meta property="og:image:type"       content="image/png">
<meta property="og:image:width"      content="1200">
<meta property="og:image:height"     content="640">
<meta property="og:image:alt"        content="World Cup 2026 choropleth map — players born in one country, playing for another">
<meta property="og:url"         content="https://mundial.cthiebaud.com/">
<meta property="og:type"        content="website">
<meta name="twitter:card"       content="summary_large_image">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="wc2026_map.css">
</head>
<body>
<header id="page-header" class="container-xxl px-0">
  <div id="page-heading-sub" class="mx-3"></div>
</header>
<div id="map-container" class="container-xxl px-0 mt-0 position-relative">
  <svg id="map" viewBox="0 0 900 480" role="img" aria-label="Choropleth map of players born in one country, playing for another"></svg>
  <span id="zoom-hint" class="position-absolute bottom-0 end-0 pe-2 pb-1">scroll to zoom · drag to pan</span>
</div>
<div class="container-xxl px-4 mt-2 mb-4">
  <div class="d-flex gap-3 align-items-start">
    <!-- legend col -->
    <div class="flex-col">
      <div id="legend" class="d-flex align-items-center justify-content-end gap-2 mb-1">
        <div>
          <div id="legend-bar" class="overflow-hidden rounded-2"></div>
          <div id="legend-ticks" class="d-flex justify-content-between"><span>0</span><span>15</span><span>35</span><span>55</span><span>66</span></div>
        </div>
        <div class="d-flex flex-column ps-2">
          <div class="d-flex align-items-center justify-content-center" style="height:10px">
            <div style="width:10px;height:10px;border-radius:50%;background:#000"></div>
          </div>
          <div id="legend-outlier-count" class="text-center" style="font-size:10px;color:var(--color-dim);margin-top:3px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="bottom-panel" class="container-xxl px-4 pb-5 mt-1">

  <ul class="nav nav-pills" id="bottomTabList" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab-players-btn" data-bs-toggle="tab" data-bs-target="#tab-players" type="button" role="tab" aria-controls="tab-players" aria-selected="true">Players</button>
    </li>
    <li class="nav-item ms-auto" role="presentation">
      <button class="nav-link" id="tab-elo-btn" data-bs-toggle="tab" data-bs-target="#tab-elo" type="button" role="tab" aria-controls="tab-elo" aria-selected="false">Elo ranking</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-chain-btn" data-bs-toggle="tab" data-bs-target="#tab-chain" type="button" role="tab" aria-controls="tab-chain" aria-selected="false">Longest path</button>
    </li>
  </ul>
  <div class="tab-content mt-3" id="bottomTabContent">
    <div class="tab-pane fade show active" id="tab-players" role="tabpanel" aria-labelledby="tab-players-btn"></div>
    <div class="tab-pane fade" id="tab-elo" role="tabpanel" aria-labelledby="tab-elo-btn"></div>
    <div class="tab-pane fade" id="tab-chain" role="tabpanel" aria-labelledby="tab-chain-btn"></div>
  </div>
</div>

<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script type="module" src="wc2026_map.js"></script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
