name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [deploy-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get data submodule SHA
        id: data-sha
        run: echo "sha=$(git rev-parse HEAD:data)" >> $GITHUB_OUTPUT

      - name: Cache submodule
        id: submodule-cache
        uses: actions/cache@v4
        with:
          path: data
          key: data-${{ steps.data-sha.outputs.sha }}

      - name: Update submodule
        if: steps.submodule-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --depth 1 data

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
